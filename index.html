        <div id="exam-modal" class="hidden fixed inset-0 z-[90] bg-academia-navy/90 backdrop-blur-sm flex items-center justify-center p-4">

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbybB7Loqhsu2RCI4clEmvpY7IVscyV_Kdr1TRzbNioSbhy3lGmcXDIRD9dWW8kHv0ei/exec";
    const SUPABASE_URL = 'https://mrxyaofzjhunmewqjwyr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yeHlhb2Z6amh1bm1ld3Fqd3lyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1ODI0MDEsImV4cCI6MjA5MTE1ODQwMX0.Q8Tj7CzXP4fJxaKcMP-s7wYEevuKlvp--anr0I-j7DQ';

    let supabaseClient;
    let currentUser = null;        
    let db = {};
    let state = { list: [], idx: 0, step: 'select', selectedVal: null, selectedEl: null, currentMode: null, currentSubject: null, corecte: [], gresite: [], rawProgress: [] };

    // Variabile pentru modul Examen
    let examState = {
        isActive: false,
        timer: null,
        timeLeftSec: 0,
        totalTimeSec: 0,
        userAnswers: {} 
    };

    function openExamConfig() { document.getElementById('exam-modal').classList.remove('hidden'); }
    function closeExamConfig() { document.getElementById('exam-modal').classList.add('hidden'); }

    function launchExam() {
        const countVal = parseInt(document.getElementById('exam-count-sel').value);
        const timeVal = parseInt(document.getElementById('exam-time-sel').value);
        let pool = [];

        if (countVal === 100) {
            // Logica EXACTĂ pentru examenul oficial: 35 Gramatică, 15 Ortografie, 30 Economie, 20 Logică
            let gramatica = (db['Limba română'] || []).filter(q => q.capitol && q.capitol.toLowerCase().includes('gramatic')).sort(() => Math.random() - 0.5).slice(0, 35);
            let ortografie = (db['Limba română'] || []).filter(q => q.capitol && (q.capitol.toLowerCase().includes('ortografie') || q.capitol.toLowerCase().includes('lexic'))).sort(() => Math.random() - 0.5).slice(0, 15);
            let economie = (db['Economie'] || []).sort(() => Math.random() - 0.5).slice(0, 30);
            let logica = (db['Logică'] || []).sort(() => Math.random() - 0.5).slice(0, 20); // Reparata eroarea de cautare ('Logică')
            
            pool = [...gramatica, ...ortografie, ...economie, ...logica];
        } else {
            const selMats = Array.from(document.querySelectorAll('.exam-mat-cb:checked')).map(cb => cb.value);
            let tempPool = [];
            selMats.forEach(m => { tempPool.push(...(db[m] || []).sort(() => Math.random() - 0.5)); });
            pool = tempPool.sort(() => Math.random() - 0.5).slice(0, countVal);
        }

        if (pool.length === 0) { alert("Nu există grile suficiente în baza de date pentru selecția făcută!"); return; }
        
        state.currentMode = 'EXAM';
        state.list = pool.sort(() => Math.random() - 0.5); 
        state.idx = 0;
        
        examState.isActive = true;
        examState.totalTimeSec = timeVal * 60;
        examState.timeLeftSec = timeVal * 60;
        examState.userAnswers = {};
        
        closeExamConfig();
        
        document.getElementById('main-nav').classList.add('hidden');
        document.getElementById('exam-header').classList.remove('hidden');
        document.getElementById('exam-header').classList.add('flex');
        
        startTimer();
        navigateTo('scr-quiz');
        renderQ();
    }

    function startTimer() {
        clearInterval(examState.timer);
        examState.timer = setInterval(() => {
            if(!examState.isActive) { clearInterval(examState.timer); return; }
            
            examState.timeLeftSec--;
            let h = Math.floor(examState.timeLeftSec / 3600);
            let m = Math.floor((examState.timeLeftSec % 3600) / 60);
            let s = examState.timeLeftSec % 60;
            
            let timeStr = h > 0 ? 
                `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}` : 
                `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                
            document.getElementById('exam-timer').innerText = timeStr;
            
            if (examState.timeLeftSec < 300) document.getElementById('exam-timer').classList.add('animate__animated', 'animate__pulse', 'animate__infinite');
            
            if(examState.timeLeftSec <= 0) { clearInterval(examState.timer); finishExam(); }
        }, 1000);
    }

    function toggleDarkMode() {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
    }

    function navigateTo(id) {
        ['scr-loading', 'scr-error', 'scr-lobby', 'scr-filter', 'scr-quiz'].forEach(s => { const el = document.getElementById(s); if(el) el.classList.add('hidden'); });
        const target = document.getElementById(id);
        if(target) { target.classList.remove('hidden'); target.classList.add('animate__fadeIn'); }
        const btnBack = document.getElementById('btn-back');
        if(btnBack) btnBack.classList.toggle('hidden', id === 'scr-lobby' || id === 'scr-loading');
    }

    document.addEventListener('click', (e) => {
        const btn = document.getElementById('btn-profile'); const menu = document.getElementById('profile-menu');

    async function checkSession() {
        try {
            const { data: { session } } = await supabaseClient.auth.getSession();
            currentUser = session?.user || null;
            if (currentUser) {
                const { data } = await supabaseClient.from('user_progress').select('grila_id, status, materie').eq('user_id', currentUser.id);
                if (data) {
                    state.rawProgress = data;
                    state.corecte = data.filter(d => d.status === 'corect').map(d => String(d.grila_id));
                    state.gresite = data.filter(d => d.status === 'gresit').map(d => String(d.grila_id));
                }
                document.getElementById('auth-prompt')?.classList.add('hidden');
            }
            updateProfileUI(); updateLobbyUI();
        } catch(e) {}
    }

    async function saveProgressToCloud(grilaId, materie, statusStr) {
        if (!currentUser) return;
        const idStr = String(grilaId);
        if (statusStr === 'corect' && state.corecte.includes(idStr)) return;
        
        const { error } = await supabaseClient
            .from('user_progress')
            .upsert({ user_id: currentUser.id, grila_id: idStr, materie: materie, status: statusStr }, { onConflict: 'user_id, grila_id' });
            
        if (!error) {
            if (statusStr === 'corect') {
                if (!state.corecte.includes(idStr)) state.corecte.push(idStr);
                state.gresite = state.gresite.filter(id => id !== idStr);
            } else {
                if (!state.gresite.includes(idStr)) state.gresite.push(idStr);
            }
            const target = state.rawProgress.find(p => p.grila_id === idStr);
            if (target) target.status = statusStr; else state.rawProgress.push({ grila_id: idStr, status: statusStr, materie: materie });
            updateProfileUI(); updateLobbyUI();
        }
    }

    function startFilteredQuiz(mode) {
        state.currentMode = mode;
        let pool = [];
        if (mode === 'GLOBAL_RANDOM' || mode === 'ERRORS') {
            pool = [].concat(...Object.values(db));
        } else {
            pool = db[state.currentSubject] || [];
        }
        
        if (mode === 'SELECTED') {
            const selCaps = Array.from(document.querySelectorAll('.cap-cb:checked')).map(c => c.value);
            const selSubs = Array.from(document.querySelectorAll('.sub-cb:checked')).map(c => c.value);
            pool = pool.filter(q => selCaps.includes(q.capitol?.trim()) || selSubs.includes(q.subcapitol?.trim()));
        }

        const originalPool = [...pool];
        
        pool = pool.filter(q => {
            let gid = q.id || q.id_grila || ""; const m = q.enunt.match(/^\s*(\d+)[\.\-\)]\s+/);
            if (m) gid = gid || m[1]; gid = String(gid);
            
            if (mode === 'ERRORS') return state.gresite.includes(gid);
            return !state.corecte.includes(gid) && !state.gresite.includes(gid); 
        });

        if (!pool.length && originalPool.length > 0) {
            pool = originalPool;
        }

        if (!pool.length) return;
        
        state.list = pool.sort(() => Math.random() - 0.5);
        state.idx = 0;
        navigateTo('scr-quiz'); renderQ();
    }

    function renderQ() {
        state.step = 'select';
        document.getElementById('auth-prompt').classList.add('hidden');
        const q = state.list[state.idx];
        
        let breadcrumbs = q.computedMaterie || state.currentSubject || 'Mix Global';
        if (q.capitol && q.capitol !== "General" && q.capitol !== "General - Mix") breadcrumbs += ` &rarr; ${q.capitol}`;
        if (q.subcapitol && q.subcapitol !== "General") breadcrumbs += ` &rarr; ${q.subcapitol}`;
        document.getElementById('q-meta').innerHTML = breadcrumbs;

        const btn = document.getElementById('btn-action');
        btn.disabled = true; btn.innerText = "Trimite Răspunsul"; btn.onclick = submitAnswer;
        btn.className = "w-full max-w-md py-5 bg-academia-navy text-academia-gold rounded-2xl font-black text-xl disabled:opacity-20 transition-all border-none cursor-pointer active-scale";
        
        if (state.currentMode === 'EXAM') {
            document.getElementById('exam-progress-text').innerText = `Grila ${state.idx + 1} din ${state.list.length}`;
            document.getElementById('exam-progress-bar').style.width = `${((state.idx) / state.list.length) * 100}%`;
            btn.innerText = state.idx === state.list.length - 1 ? "Finalizează Examenul" : "Salvează și Continuă";
        }
        
        const modeBadge = document.getElementById('q-mode-badge'); const errorBorder = document.getElementById('quiz-badge-error');
        if(state.currentMode === 'ERRORS') { modeBadge.classList.remove('hidden'); errorBorder.classList.remove('hidden'); }
        else { modeBadge.classList.add('hidden'); errorBorder.classList.add('hidden'); }
        
        let txt = q.enunt; let gid = q.id || q.id_grila || "";
        const m = txt.match(/^\s*(\d+)[\.\-\)]\s+/);
        if (m) { gid = gid || m[1]; txt = txt.replace(m[0], ''); }
        
        let hasRule1 = false;
        txt = txt.replace(/(enun[tț]ul|fraza)\s*:\s*(.*?(?:\.|\!|\?))/gi, (match, prefix, continut) => {
            hasRule1 = true;
            return `${prefix}: „${continut}”`;
        });

        if (!hasRule1) {
            txt = txt.replace(/(\(\d+\)\s*.*?(?:\.|\!|\?))/g, '„$1”');
        }

        if (q.computedMaterie === 'Logică') {
            txt = txt.replace(/\d+/g, '');
        }

        document.getElementById('q-text').innerHTML = `<div class="font-bold text-xl md:text-2xl leading-snug animate__animated animate__fadeIn text-academia-navy dark:text-white">${txt}</div>`;
        
        let sTxt = (gid || q.sursa) ? `Sursa: ${[gid, q.sursa].filter(Boolean).join(", ")}` : "";
        document.getElementById('q-sursa').innerText = sTxt;
        
        const cont = document.getElementById('q-options'); cont.innerHTML = "";
        ['var_a', 'var_b', 'var_c', 'var_d'].forEach(k => {
            if (!q[k]) return;
            const letter = k.split('_')[1].toUpperCase(); const opt = document.createElement('div');
            opt.className = "opt-card p-5 glass-card dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 rounded-2xl cursor-pointer font-bold flex gap-4 items-center active-scale transition-all";
            opt.innerHTML = `<span class="w-10 h-10 rounded-xl border-2 border-slate-200 dark:border-slate-600 flex items-center justify-center text-sm font-black text-slate-400 dark:text-slate-400 flex-shrink-0 transition-colors">${letter}</span><span class="text-academia-navy dark:text-slate-200 text-lg leading-snug transition-colors">${q[k]}</span>`;
            opt.onclick = () => {
                if(state.step !== 'select') return;
                document.querySelectorAll('.opt-card').forEach(c => c.classList.remove('border-academia-gold', 'bg-academia-goldL', 'dark:bg-slate-900'));
                opt.classList.add('border-academia-gold', 'bg-academia-goldL', 'dark:bg-slate-900');
                state.selectedVal = letter; state.selectedEl = opt; btn.disabled = false;
            };
            cont.appendChild(opt);
        });

    function submitAnswer() {
        if (state.step !== 'select') return;
        const q = state.list[state.idx];
        const cor = q.raspuns_corect.trim().toUpperCase();
        const corIdx = ['A','B','C','D'].indexOf(cor); const corEl = document.querySelector(`.opt-card:nth-child(${corIdx + 1})`);
        
        document.querySelectorAll('.opt-card').forEach(c => c.classList.add('opacity-30'));
        [state.selectedEl, corEl].forEach(c => c?.classList.remove('opacity-30'));
        
        let gid = q.id || q.id_grila || ""; const m = q.enunt.match(/^\s*(\d+)[\.\-\)]\s+/);
        if (m) gid = gid || m[1];
        gid = gid || state.idx; // Fallback pentru siguranta stocarii in array

        // LOGICĂ EXAMEN: Trecere instantă, fără culori de feedback și fără lag
        if (state.currentMode === 'EXAM') {
            examState.userAnswers[gid] = state.selectedVal;
            
            state.idx++;
            if (state.idx < state.list.length) {
                renderQ();
            } else {
                finishExam();
            }
            return;
        }

        const isCorrect = state.selectedVal === cor;
        
        state.selectedEl.classList.remove('bg-white', 'bg-academia-goldL', 'border-slate-100', 'border-academia-gold', 'glass-card', 'dark:bg-slate-800', 'dark:border-slate-700', 'dark:bg-slate-900');
        state.selectedEl.classList.add('text-white');
        state.selectedEl.querySelectorAll('span').forEach(s => s.classList.remove('text-slate-400', 'dark:text-slate-400', 'text-academia-gold', 'border-slate-200', 'dark:border-slate-600', 'border-academia-gold'));

        if (isCorrect) {
            state.selectedEl.classList.add('bg-emerald-500', 'border-emerald-500');
            state.selectedEl.querySelectorAll('span').forEach(s=>s.classList.add('text-white', 'border-white'));
            if (currentUser) saveProgressToCloud(gid || state.idx, q.computedMaterie || state.currentSubject, 'corect');
        } else {
            state.selectedEl.classList.add('bg-rose-500', 'border-rose-500');
            state.selectedEl.querySelectorAll('span').forEach(s=>s.classList.add('text-white', 'border-white'));
            
            if (corEl) {
                corEl.classList.remove('bg-white', 'border-slate-100', 'glass-card', 'dark:bg-slate-800', 'dark:border-slate-700', 'dark:bg-slate-900');
                corEl.classList.add('bg-emerald-500', 'border-emerald-500', 'text-white');
                corEl.querySelectorAll('span').forEach(s => {
                    s.classList.remove('text-slate-400', 'dark:text-slate-400', 'border-slate-200', 'dark:border-slate-600');
                    s.classList.add('text-white', 'border-white');
                });
            }
            if (currentUser) saveProgressToCloud(gid || state.idx, q.computedMaterie || state.currentSubject, 'gresit');
        }
        
        if (!currentUser) {
            const prompt = document.getElementById('auth-prompt');
            const msgEl = document.getElementById('auth-prompt-msg');
            msgEl.innerText = isCorrect 
                ? "Corect! Salvează progresul pentru a nu mai primi această grilă." 
                : "Ai greșit. Creează cont pentru a o salva în Modulul de Revizuire.";
            prompt.classList.remove('hidden');
        }
        
        state.step = 'validate'; const btn = document.getElementById('btn-action');
        btn.innerText = "Continuă Navigarea \u2192"; btn.classList.add('bg-academia-gold', 'text-white');
        btn.onclick = () => { 
            state.idx++; 
            if (state.idx < state.list.length) {
                renderQ(); 
            } else { 
                goBack(); 
            } 
        };
    }

    function processRawData(data) {
        const formatString = (str, isEcoLog) => {
            if (!str) return "General";
            let cleaned = String(str).trim();
            if (isEcoLog) {
                cleaned = cleaned.replace(/\d+/g, '');
                cleaned = cleaned.replace(/^[.\-\s]+/, '').trim();
            }
            if (!cleaned) return "General";
            return cleaned.charAt(0).toUpperCase() + cleaned.slice(1);
        };

        return data.reduce((acc, item) => {
            if (!item.materie || !item.enunt || String(item.enunt).trim() === "") return acc;
            let rawM = String(item.materie).trim();
            if (rawM.toLowerCase() === 'altele') return acc;
            let m = rawM;
            const lowerM = rawM.toLowerCase();
            let isEcoLog = false;
            if (lowerM.includes('română')) m = 'Limba română';
            else if (lowerM.includes('economie')) { m = 'Economie'; isEcoLog = true; }
            else if (lowerM.includes('gândire') || lowerM.includes('gandire') || lowerM.includes('logic')  || lowerM.includes('Logic')) { m = 'Logică'; isEcoLog = true; }

            item.capOrder = parseInt((String(item.capitol || "")).match(/\d+/)) || 999;
            item.subOrder = parseInt((String(item.subcapitol || "")).match(/\d+/)) || 999;
            item.capitol = formatString(item.capitol, isEcoLog);
            item.subcapitol = formatString(item.subcapitol, isEcoLog);

            if (!acc[m]) acc[m] = [];
            item.computedMaterie = m;
            acc[m].push(item);
            return acc;
        }, {});
    }

    async function init() {
        try {
            if(!window.supabase) throw new Error("Dependență lipsă: Supabase CDN.");
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            await checkSession();
            const cached = localStorage.getItem('grile_db');
            if (cached) {
                db = processRawData(JSON.parse(cached));
                renderLobby();
                fetch(API_URL).then(r=>r.json()).then(data => {
                    const newDataStr = JSON.stringify(data);
                    if(cached !== newDataStr) {
                        localStorage.setItem('grile_db', newDataStr);
                        db = processRawData(data);
                        renderLobby();
                    }
                }).catch(e => {});
            } else {
                const res = await fetch(API_URL);
                if(!res.ok) throw new Error("Eroare la extragerea datelor.");
                const data = await res.json();
                localStorage.setItem('grile_db', JSON.stringify(data));
                db = processRawData(data);
                renderLobby();
            }
        } catch(e) {
            document.getElementById('error-details').innerText = e.message;
            navigateTo('scr-error');
        }
    }

    function openFilter(m) {
        state.currentSubject = m; document.getElementById('filter-title').innerText = m;
        const capsData = {};
        db[m].forEach(q => {
            const c = q.capitol || "General - Mix";
            const sc = q.subcapitol || "General";
            if (!capsData[c]) capsData[c] = { order: q.capOrder, subcaps: {} };
            if (q.capOrder < capsData[c].order) capsData[c].order = q.capOrder;
            if (sc !== "General") {
                if (!capsData[c].subcaps[sc]) capsData[c].subcaps[sc] = q.subOrder;
                if (q.subOrder < capsData[c].subcaps[sc]) capsData[c].subcaps[sc] = q.subOrder;
            }
        });
        let sortedCaps = Object.keys(capsData);
        if (m === 'Limba română') {
            sortedCaps.sort((a, b) => a.localeCompare(b, 'ro'));
        } else {
            sortedCaps.sort((a, b) => capsData[a].order - capsData[b].order);
        }
        const cont = document.getElementById('filter-list'); cont.innerHTML = "";
        sortedCaps.forEach(cap => {
            const capId = 'cap_' + cap.replace(/[\s\W]+/g, '');
            let html = `<div class="bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl overflow-hidden mb-3 transition-colors duration-300">`;
            const subKeys = Object.keys(capsData[cap].subcaps);
            if (m === 'Limba română') {
                subKeys.sort((a, b) => a.localeCompare(b, 'ro'));
            } else {
                subKeys.sort((a, b) => capsData[cap].subcaps[a] - capsData[cap].subcaps[b]);
            }
            if (subKeys.length > 0) {
                html += `
                    <div class="flex items-center p-5 cursor-pointer select-none" onclick="toggleAccordion('${capId}')">
                        <input type="checkbox" class="cap-cb w-6 h-6 accent-academia-gold mr-4" value="${cap}" onchange="event.stopPropagation(); toggleSubcaps('${capId}', this.checked)">
                        <span class="font-bold text-lg text-academia-navy dark:text-white flex-1">${cap}</span>
                        <span id="${capId}_arrow" class="arrow-rotate text-academia-gold font-bold text-xl px-2">&#9662;</span>
                    </div>
                    <div id="${capId}_wrap" class="accordion-content">
                        <div class="bg-white dark:bg-slate-900 transition-colors duration-300">
                            <div class="pl-14 pr-5 pb-5 space-y-4 border-t border-slate-200 dark:border-slate-700 pt-4">
                                ${subKeys.map(sub => `
                                    <label class="flex items-center gap-3 text-slate-600 dark:text-slate-300 font-semibold cursor-pointer active:opacity-70 transition-opacity text-base">
                                        <input type="checkbox" class="sub-cb w-5 h-5 accent-academia-gold" value="${sub}"> <span class="leading-tight">${sub}</span>
                                    </label>
                                `).join('')}
                            </div>
                        </div>
                    </div>`;
            } else {
                html += `<label class="flex items-center p-5 cursor-pointer"><input type="checkbox" class="cap-cb w-6 h-6 accent-academia-gold mr-4" value="${cap}"><span class="font-bold text-lg dark:text-white">${cap}</span></label>`;
            }
            html += `</div>`;
            cont.innerHTML += html;
        });
        navigateTo('scr-filter');
    }

                <h2 class="text-4xl md:text-5xl font-black text-academia-navy dark:text-white mb-4">Examen Finalizat</h2>
                <p class="text-slate-500 dark:text-slate-400 mb-10 font-bold uppercase tracking-widest text-xs">Raport de performanță</p>
                
                <div class="inline-flex items-center justify-center w-40 h-40 rounded-full border-[8px] ${procent >= 70 ? 'border-emerald-500 text-emerald-500' : 'border-academia-gold text-academia-gold'} mb-8 shadow-xl">
                    <span class="text-5xl font-black">${scor}/${state.list.length}</span>
                </div>
                
                <h3 class="text-3xl font-black text-academia-navy dark:text-white mb-10">${procent}% Acuratețe</h3>
                
                <button onclick="window.location.reload()" class="w-full max-w-md py-6 bg-academia-navy text-academia-gold rounded-[24px] font-black text-xl border-none cursor-pointer active-scale shadow-2xl hover:shadow-lg transition-all">Revenire la Dashboard</button>
            </div>
        `;
        
        if(procent >= 70) confetti({ particleCount: 200, spread: 90, origin: { y: 0.6 } });
    }

    window.addEventListener('DOMContentLoaded', init);
    window.addEventListener('popstate', (e) => { navigateTo('scr-lobby'); });
    function goBack() { navigateTo('scr-lobby'); }
</script>
</body>
</html>
