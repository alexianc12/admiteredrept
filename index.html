<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grile Admitere Drept UB | Română, Logică, Economie</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js" defer></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { academia: { navy: '#1A2238', gold: '#C19A6B', goldL: '#FBF5E9' } },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .opt-card, .btn-primary, .subject-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .active-scale:active { transform: scale(0.98); }
        .accordion-content { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s ease; }
        .accordion-content > div { overflow: hidden; }
        .accordion-open { grid-template-rows: 1fr; }
        .arrow-rotate { transition: transform 0.3s ease; }
        .rotated { transform: rotate(180deg); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #C19A6B; border-radius: 10px; }
        
        :root { --glass: rgba(255, 255, 255, 0.85); --glass-border: rgba(255, 255, 255, 0.4); }
        .dark { --glass: rgba(26, 34, 56, 0.85); --glass-border: rgba(255, 255, 255, 0.1); }
        .glass-card { 
            background: var(--glass); 
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border); 
        }
    </style>
</head>

<body class="bg-slate-50 dark:bg-slate-950 text-academia-navy dark:text-slate-100 min-h-screen transition-colors duration-300 font-sans">
    
    <div id="scr-loading" class="fixed inset-0 z-[200] bg-white dark:bg-slate-950 flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-slate-100 dark:border-slate-800 border-t-academia-gold rounded-full animate-spin mb-4"></div>
        <p class="text-xs font-black uppercase tracking-widest text-slate-400">Sincronizare Bază de Date...</p>
    </div>

    <nav id="main-nav" class="fixed top-0 w-full z-50 px-6 py-4 glass-card border-b border-slate-200 dark:border-slate-800 flex justify-between items-center shadow-sm transition-colors duration-300">
        <div class="flex items-center gap-4">
            <button class="font-black text-xl tracking-tighter uppercase bg-transparent border-none p-0 text-academia-navy dark:text-white cursor-pointer" onclick="window.location.reload()">
                <span class="text-academia-gold">GRILE</span>ADMITERE<span class="text-academia-gold">DREPT</span>
            </button>
        </div>
        <div class="flex items-center gap-3">
            <div id="streak-container" class="hidden flex items-center gap-1.5 bg-orange-50 dark:bg-orange-900/20 px-3 py-1.5 rounded-full border border-orange-100 dark:border-orange-800 transition-all">
                <span class="text-orange-500 text-sm">🔥</span>
                <span id="streak-count" class="font-black text-orange-600 dark:text-orange-400 text-sm">0</span>
            </div>
            <button onclick="toggleDarkMode()" class="text-academia-gold bg-transparent border-none cursor-pointer hover:scale-110 transition-transform"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg></button>
            <button onclick="toggleProfileMenu()" class="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center hover:text-academia-gold transition-all border-none cursor-pointer"><svg class="w-5 h-5 dark:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg></button>
        </div>
    </nav>

    <main class="pt-24 pb-8 px-4 flex justify-center">
        <div class="w-full max-w-5xl">
            <div id="scr-lobby" class="hidden max-w-3xl mx-auto mt-6">
                <div class="text-center mb-10">
                    <h1 class="text-3xl md:text-4xl font-black text-academia-navy dark:text-white mb-4">Rezolvă grile pentru admitere</h1>
                </div>
                <button onclick="startFilteredQuiz('GLOBAL_RANDOM')" class="w-full mb-4 py-5 bg-academia-navy text-academia-gold rounded-3xl font-black text-lg active-scale border-none cursor-pointer shadow-sm">MIX TOATE MATERIILE (Random)</button>
                <div id="subject-list" class="grid gap-4 mb-6"></div>
            </div>

            <div id="scr-filter" class="hidden max-w-3xl mx-auto mt-6">
                <div class="glass-card dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[40px] shadow-xl p-8 transition-colors duration-300">
                    <h2 id="filter-title" class="text-3xl font-black text-center mb-8 text-academia-navy dark:text-white"></h2>
                    <div id="filter-list" class="space-y-3 mb-8 max-h-[50vh] overflow-y-auto pr-2"></div>
                    <button onclick="startFilteredQuiz('SELECTED')" class="w-full py-5 bg-academia-gold text-white rounded-2xl font-black text-lg active-scale border-none cursor-pointer shadow-lg">ÎNCEPE REZOLVAREA &rarr;</button>
                </div>
            </div>

            <div id="scr-quiz" class="hidden mt-2">
                <div class="glass-card dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[40px] shadow-2xl p-6 md:p-10 relative overflow-hidden transition-colors duration-300">
                    <div class="flex justify-between items-center mb-6 border-b border-slate-100 dark:border-slate-800 pb-4">
                        <span id="q-meta" class="text-[10px] font-black uppercase tracking-widest text-academia-gold">...</span>
                    </div>
                    <div id="q-text" class="mb-8"></div>
                    <div id="q-options" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                    <div class="mt-10 flex flex-col items-center">
                        <div id="q-sursa" class="text-[10px] font-bold text-slate-400 mb-5 uppercase tracking-wide text-center"></div>
                        <button id="btn-action" disabled class="w-full max-w-md py-5 bg-academia-navy text-academia-gold rounded-2xl font-black text-xl disabled:opacity-20 active-scale border-none cursor-pointer shadow-xl">Trimite Răspunsul</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbybB7Loqhsu2RCI4clEmvpY7IVscyV_Kdr1TRzbNioSbhy3lGmcXDIRD9dWW8kHv0ei/exec";
        let db = {};
        let state = { list: [], idx: 0, step: 'select', selectedVal: null, selectedEl: null, currentSubject: null, corecte: [], gresite: [] };

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        function navigateTo(id) {
            ['scr-loading', 'scr-lobby', 'scr-filter', 'scr-quiz'].forEach(s => document.getElementById(s).classList.add('hidden'));
            const target = document.getElementById(id);
            target.classList.remove('hidden');
            target.classList.add('animate__fadeIn');
        }

        function renderQ() {
            state.step = 'select';
            const q = state.list[state.idx];
            document.getElementById('q-meta').innerHTML = `${q.computedMaterie} &rarr; ${q.capitol}`;
            document.getElementById('q-text').innerHTML = `<div class="font-bold text-xl md:text-2xl leading-snug text-academia-navy dark:text-white">${q.enunt}</div>`;
            
            const btn = document.getElementById('btn-action');
            btn.disabled = true; btn.innerText = "Trimite Răspunsul"; btn.onclick = submitAnswer;
            btn.className = "w-full max-w-md py-5 bg-academia-navy text-academia-gold rounded-2xl font-black text-xl disabled:opacity-20 active-scale border-none cursor-pointer shadow-xl";

            const cont = document.getElementById('q-options'); cont.innerHTML = "";
            ['var_a', 'var_b', 'var_c', 'var_d'].forEach(k => {
                if (!q[k]) return;
                const letter = k.split('_')[1].toUpperCase();
                const opt = document.createElement('div');
                // Structural: menținem border-2 pentru chenar constant
                opt.className = "opt-card p-5 glass-card dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 rounded-2xl cursor-pointer font-bold flex gap-4 items-center active-scale transition-all shadow-sm";
                opt.innerHTML = `<span class="w-10 h-10 rounded-xl border-2 border-slate-200 dark:border-slate-600 flex items-center justify-center text-sm font-black flex-shrink-0">${letter}</span><span class="text-lg leading-snug">${q[k]}</span>`;
                opt.onclick = () => {
                    if(state.step !== 'select') return;
                    document.querySelectorAll('.opt-card').forEach(c => c.classList.remove('border-academia-gold', 'bg-academia-goldL', 'dark:bg-slate-900'));
                    opt.classList.add('border-academia-gold', 'bg-academia-goldL', 'dark:bg-slate-900');
                    state.selectedVal = letter; state.selectedEl = opt; btn.disabled = false;
                };
                cont.appendChild(opt);
            });
        }

        function submitAnswer() {
            if (state.step !== 'select') return;
            const q = state.list[state.idx];
            const cor = (q.raspuns_corect || "").trim().toUpperCase();
            const corIdx = ['A','B','C','D'].indexOf(cor); 
            const allCards = document.querySelectorAll('.opt-card');
            const corEl = corIdx >= 0 ? allCards[corIdx] : null;
            
            allCards.forEach(c => c.classList.add('opacity-30'));
            const isCorrect = state.selectedVal === cor;
            
            // LOGICA REPARATĂ: Nu eliminăm border-ul structural, schimbăm doar culorile de stare
            if (state.selectedEl) {
                state.selectedEl.classList.remove('opacity-30', 'border-slate-200', 'border-academia-gold', 'dark:border-slate-700', 'bg-white', 'bg-academia-goldL', 'dark:bg-slate-800', 'dark:bg-slate-900');
                state.selectedEl.classList.add('text-white', isCorrect ? 'bg-emerald-500' : 'bg-rose-500', isCorrect ? 'border-emerald-500' : 'border-rose-500');
                state.selectedEl.querySelectorAll('span').forEach(s => {
                    s.classList.remove('border-slate-200', 'dark:border-slate-600');
                    s.classList.add('text-white', 'border-white');
                });
            }

            if (!isCorrect && corEl) {
                corEl.classList.remove('opacity-30', 'border-slate-200', 'dark:border-slate-700', 'bg-white', 'dark:bg-slate-800', 'dark:bg-slate-900');
                corEl.classList.add('bg-emerald-500', 'border-emerald-500', 'text-white');
                corEl.querySelectorAll('span').forEach(s => {
                    s.classList.remove('border-slate-200', 'dark:border-slate-600');
                    s.classList.add('text-white', 'border-white');
                });
            }

            state.step = 'validate'; 
            const btn = document.getElementById('btn-action');
            btn.innerText = "Următoarea Grilă \u2192"; btn.classList.add('bg-academia-gold', 'text-white');
            btn.onclick = () => { 
                state.idx++; 
                if (state.idx < state.list.length) renderQ(); 
                else window.location.reload(); 
            };
        }

        function processRawData(data) {
            return data.reduce((acc, item) => {
                const materie = item.materie || item.MATERIE || item.Materie;
                const enunt = item.enunt || item.ENUNT || item.Enunt;
                if (!materie || !enunt) return acc;
                let m = String(materie).trim();
                const lm = m.toLowerCase();
                if (lm.includes('română')) m = 'Limba română';
                else if (lm.includes('economie')) m = 'Economie';
                else if (lm.includes('logic')) m = 'Logică';
                item.computedMaterie = m;
                item.capitol = (item.capitol || "General").trim();
                item.subcapitol = (item.subcapitol || "General").trim();
                item.var_a = item.var_a || item.a; item.var_b = item.var_b || item.b;
                item.var_c = item.var_c || item.c; item.var_d = item.var_d || item.d;
                item.raspuns_corect = item.raspuns_corect || item.raspuns;
                if (!acc[m]) acc[m] = []; acc[m].push(item); return acc;
            }, {});
        }

        async function init() {
            const cache = localStorage.getItem('grile_db_premium');
            if (cache) { db = JSON.parse(cache); renderLobby(); document.getElementById('scr-loading').classList.add('hidden'); }
            fetch(API_URL).then(r => r.json()).then(data => {
                db = processRawData(data);
                localStorage.setItem('grile_db_premium', JSON.stringify(db));
                if (!cache) { renderLobby(); document.getElementById('scr-loading').classList.add('hidden'); }
            });
        }

        function renderLobby() {
            const list = document.getElementById('subject-list'); list.innerHTML = "";
            Object.keys(db).forEach(m => {
                const d = document.createElement('div');
                d.className = "p-6 glass-card dark:bg-slate-900 border-2 border-slate-100 dark:border-slate-800 rounded-3xl cursor-pointer hover:border-academia-gold transition-all active-scale font-black text-xl flex justify-between items-center group shadow-sm";
                d.onclick = () => openFilter(m);
                d.innerHTML = `<span class="dark:text-white">${m}</span> <span class="text-academia-gold group-hover:translate-x-2 transition-transform">&rarr;</span>`;
                list.appendChild(d);
            });
            navigateTo('scr-lobby');
        }

        function openFilter(m) {
            state.currentSubject = m;
            document.getElementById('filter-title').innerText = m;
            const caps = [...new Set(db[m].map(q => q.capitol))];
            const cont = document.getElementById('filter-list'); cont.innerHTML = "";
            caps.forEach(cap => {
                const html = `<label class="flex items-center p-5 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl cursor-pointer"><input type="checkbox" class="cap-cb w-6 h-6 accent-academia-gold mr-4" value="${cap}"><span class="font-bold text-lg dark:text-white">${cap}</span></label>`;
                cont.innerHTML += html;
            });
            navigateTo('scr-filter');
        }

        function startFilteredQuiz(mode) {
            let pool = (mode === 'GLOBAL_RANDOM') ? [].concat(...Object.values(db)) : db[state.currentSubject];
            if (mode === 'SELECTED') {
                const sel = Array.from(document.querySelectorAll('.cap-cb:checked')).map(c => c.value);
                pool = pool.filter(q => sel.includes(q.capitol));
            }
            if (!pool.length) return;
            state.list = pool.sort(() => Math.random() - 0.5);
            state.idx = 0;
            navigateTo('scr-quiz'); renderQ();
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
