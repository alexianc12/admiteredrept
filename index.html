                <div class="grid grid-cols-1 gap-2">
                    <label class="flex items-center gap-3 p-3 bg-slate-50 dark:bg-slate-800 rounded-xl cursor-pointer"><input type="checkbox" class="exam-mat-cb w-5 h-5 accent-academia-gold" value="Limba română" checked> <span class="font-bold dark:text-white">Limba română</span></label>
                    <label class="flex items-center gap-3 p-3 bg-slate-50 dark:bg-slate-800 rounded-xl cursor-pointer"><input type="checkbox" class="exam-mat-cb w-5 h-5 accent-academia-gold" value="Economie" checked> <span class="font-bold dark:text-white">Economie</span></label>
                    <label class="flex items-center gap-3 p-3 bg-slate-50 dark:bg-slate-800 rounded-xl cursor-pointer"><input type="checkbox" class="exam-mat-cb w-5 h-5 accent-academia-gold" value="Logică" checked> <span class="font-bold dark:text-white">Logică</span></label>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <select id="exam-time-sel" class="p-4 rounded-xl bg-slate-50 dark:bg-slate-800 dark:text-white font-bold border-none outline-none"><option value="30" selected>30 Min</option><option value="60">60 Min</option></select>
                    <select id="exam-count-sel" class="p-4 rounded-xl bg-slate-50 dark:bg-slate-800 dark:text-white font-bold border-none outline-none"><option value="30" selected>30 Grile</option><option value="100">100 Grile</option></select>
                </div>
                <button onclick="UI.launchExam()" class="w-full py-5 bg-academia-gold text-white rounded-2xl font-black text-lg border-none cursor-pointer active-scale shadow-lg">Lansează Examenul</button>
            </div>
        </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbybB7Loqhsu2RCI4clEmvpY7IVscyV_Kdr1TRzbNioSbhy3lGmcXDIRD9dWW8kHv0ei/exec";
        const SUPABASE_URL = 'https://mrxyaofzjhunmewqjwyr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yeHlhb2Z6amh1bm1ld3Fqd3lyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1ODI0MDEsImV4cCI6MjA5MTE1ODQwMX0.Q8Tj7CzXP4fJxaKcMP-s7wYEevuKlvp--anr0I-j7DQ';

        let supabaseClient, db = {};
        const State = {
            currentUser: null, corecte: [], gresite: [], streak: 0, currentSubject: null,
            quiz: { pool: [], idx: 0, config: null, selectedVal: null, selectedEl: null, step: 'select', startTime: 0 },
            exam: { isActive: false, timer: null, timeLeft: 0, answers: {} }
        };

        const Router = {
            init() { 
                window.addEventListener('hashchange', () => this.handleRoute()); 
                if(!window.location.hash) window.location.hash = 'lobby'; else this.handleRoute(); 
            },
            navigate(page, params = {}) {
                const sp = new URLSearchParams(); Object.keys(params).forEach(k => sp.append(k, params[k]));
                window.location.hash = sp.toString() ? `${page}?${sp.toString()}` : page;
            },
            handleBack() {
                const [page] = window.location.hash.replace('#', '').split('?');
                if (page === 'quiz' && State.quiz.config?.subject) {
                    this.navigate('materie', { subj: State.quiz.config.subject });
                } else {
                    this.navigate('lobby');
                }
            },
            handleRoute() {
                const [page, qs] = window.location.hash.replace('#', '').split('?');
                const params = new URLSearchParams(qs || '');
                document.querySelectorAll('.view-screen').forEach(el => el.classList.add('hidden'));
                document.getElementById('nav-back-arrow').classList.toggle('hidden', page === 'lobby');
                document.getElementById('exam-header').classList.add('hidden');
                
                if (page === 'lobby') { UI.showLobby(); }
                else if (page === 'materie') { UI.showFilter(params.get('subj')); }
                else if (page === 'quiz') { UI.showQuiz(); }
            }
        };

        /** INTEGRATED processRawData EXACTLY AS PROVIDED **/
        function processRawData(data) {
            const formatString = (str, isEcoLog) => {
                if (isEcoLog) return "General";
                if (!str) return "General";
                let cleaned = String(str).trim();
                if (!cleaned || cleaned.toLowerCase() === "general") return "General";
                return cleaned.charAt(0).toUpperCase() + cleaned.slice(1);
            };

            return data.reduce((acc, item) => {
                const materie = item.materie || item.MATERIE || item.Materie;
                const enunt = item.enunt || item.ENUNT || item.Enunt;
                if (!materie || !enunt || String(enunt).trim() === "") return acc;
                
                let rawM = String(materie).trim();
                let m = rawM;
                const lowerM = rawM.toLowerCase();
                let isEcoLog = false;
                
                if (lowerM.includes('română')) m = 'Limba română';
                else if (lowerM.includes('economie')) { m = 'Economie'; isEcoLog = true; }
                else if (lowerM.includes('gândire') || lowerM.includes('logic')) { m = 'Logică'; isEcoLog = true; }

                let cap = String(item.capitol || item.CAPITOL || item.Capitol || "").trim();
                let sub = String(item.subcapitol || item.SUBCAPITOL || item.Subcapitol || item.sub || "").trim();

                let capL = cap.toLowerCase();
                let subL = sub.toLowerCase();

                if (capL.includes("gramatică") || capL.includes("gramatica")) cap = "Gramatică";
                if (capL.includes("ortografie") || capL.includes("ortoepie") || capL.includes("lexico-semantice")) {
                    cap = "Ortografie, ortoepie și punctuație";
                }
                
                if (subL.includes("sintaxa frazei") || subL.includes("enunțul") || subL.includes("propoziția") || subL.includes("fraza") || subL.includes("enuntul") || subL.includes("propozitia")) {
                    sub = "Enunțul, propoziția și fraza";
                }
                
                if (sub.toLowerCase().trim() === cap.toLowerCase().trim()) {
                    sub = "General";
                }

                item.capitol = formatString(cap, false);
                item.subcapitol = formatString(sub, isEcoLog);
                item.computedMaterie = m;

                item.var_a = item.var_a || item.VAR_A || item.a;
                item.var_b = item.var_b || item.VAR_B || item.b;
                item.var_c = item.var_c || item.VAR_C || item.c;
                item.var_d = item.var_d || item.VAR_D || item.d;
                item.raspuns_corect = item.raspuns_corect || item.RASPUNS_CORECT || item.raspuns;

                if (!acc[m]) acc[m] = [];
                acc[m].push(item);
                return acc;
            }, {});
        }

        const Utils = {
            parsePremiumText(txt) {
                if(!txt) return "";
                let res = txt.replace(/\$/g, '').replace(/_\{([^\}]+)\}/g, '<sub>$1</sub>').replace(/\^\{([^\}]+)\}/g, '<sup>$1</sup>');
                const tag = '<u class="decoration-academia-gold decoration-[2.5px] underline-offset-[4px] font-black text-academia-navy dark:text-white">$1</u>';
                return res.replace(/\[\[u\]\](.*?)\[\[\/u\]\]/gi, tag).replace(/\[\[(.*?)\]\]/g, tag).replace(/\*(.*?)\*/g, tag);
            }
        };

        const Engine = {
            startQuizConfig(c) { State.quiz.config = c; if (State.currentSubject) State.quiz.config.subject = State.currentSubject; Router.navigate('quiz'); },
            buildPoolAndStart() {
                let pool = []; const c = State.quiz.config; if(!c) return Router.navigate('lobby');
                if (c.mode === 'GLOBAL_RANDOM' || c.mode === 'ERRORS') pool = [].concat(...Object.values(db));
                else if (c.mode === 'SUBJECT_MIX') pool = db[State.currentSubject] || [];
                else if (c.mode === 'SELECTED') pool = (db[State.currentSubject] || []).filter(q => c.caps.includes(q.capitol?.trim()) || c.subs.includes(q.subcapitol?.trim()));
                else if (c.mode === 'EXAM') {
                    c.examMats.forEach(m => pool.push(...(db[m] || []))); pool = pool.sort(()=>Math.random()-0.5).slice(0, c.examCount);
                    State.exam.isActive = true; State.exam.timeLeft = c.examTimeSec; State.exam.answers = {};
                    document.getElementById('exam-header').classList.remove('hidden'); document.getElementById('exam-header').classList.add('flex');
                    this.startTimer();
                }
                if (c.mode === 'ERRORS') pool = pool.filter(q => State.gresite.includes(String(q.id || q.id_grila)));
                else if (c.mode !== 'EXAM') pool = pool.filter(q => !State.corecte.includes(String(q.id || q.id_grila)));
                
                if (!pool.length) { alert("Nu există grile."); return Router.navigate('lobby'); }
                State.quiz.pool = pool.sort(() => Math.random() - 0.5); State.quiz.idx = 0;
                this.renderQ();
            },
            startTimer() {
                clearInterval(State.exam.timer);
                State.exam.timer = setInterval(() => {
                    if(!State.exam.isActive) return clearInterval(State.exam.timer);
                    State.exam.timeLeft--;
                    let m = Math.floor(State.exam.timeLeft / 60), s = State.exam.timeLeft % 60;
                    document.getElementById('exam-timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                    if(State.exam.timeLeft <= 0) this.finishExam();
                }, 1000);
            },
            renderQ() {
                State.quiz.startTime = Date.now(); State.quiz.step = 'select';
                const q = State.quiz.pool[State.quiz.idx];
                document.getElementById('q-meta').innerHTML = `${q.computedMaterie} &rarr; ${q.capitol}`;
                document.getElementById('q-text').innerHTML = `<div class="font-bold text-xl md:text-2xl animate__animated animate__fadeIn leading-snug text-academia-navy dark:text-white">${Utils.parsePremiumText(q.enunt)}</div>`;
                
                const btn = document.getElementById('btn-action'); btn.disabled = true; btn.innerText = "Trimite Răspunsul"; btn.onclick = () => Engine.submit();
                btn.className = "w-full max-w-md py-5 bg-academia-navy text-academia-gold rounded-2xl font-black text-xl disabled:opacity-20 active-scale border-none cursor-pointer shadow-xl";

                if (State.quiz.config.mode === 'EXAM') {
                    document.getElementById('exam-progress-text').innerText = `Grila ${State.quiz.idx + 1} / ${State.quiz.pool.length}`;
                    document.getElementById('exam-progress-bar').style.width = `${(State.quiz.idx / State.quiz.pool.length)*100}%`;
                }

                const cont = document.getElementById('q-options'); cont.innerHTML = "";
                ['var_a', 'var_b', 'var_c', 'var_d'].forEach(k => {
                    if (!q[k]) return;
                    const letter = k.split('_')[1].toUpperCase();
                    const opt = document.createElement('div');
                    // DESIGN REPARAT: border-2 vizibil permanent
                    opt.className = "opt-card p-5 glass-card dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 rounded-2xl cursor-pointer font-bold flex gap-4 items-center active-scale transition-all";
                    opt.innerHTML = `<span class="w-10 h-10 rounded-xl border-2 border-slate-200 dark:border-slate-600 flex items-center justify-center text-sm font-black flex-shrink-0 transition-colors">${letter}</span><span class="text-lg leading-snug">${Utils.parsePremiumText(String(q[k]))}</span>`;
                    opt.onclick = () => {
                        if(State.quiz.step !== 'select') return;
                        document.querySelectorAll('.opt-card').forEach(c => c.classList.remove('border-academia-gold', 'bg-academia-goldL', 'dark:bg-slate-900'));
                        opt.classList.add('border-academia-gold', 'bg-academia-goldL', 'dark:bg-slate-900');
                        State.quiz.selectedVal = letter; State.quiz.selectedEl = opt; btn.disabled = false;
                    };
                    cont.appendChild(opt);
                });
            },
            submit() {
                if (State.quiz.step !== 'select') return;
                const q = State.quiz.pool[State.quiz.idx], cor = (q.raspuns_corect || "").trim().toUpperCase();
                const corIdx = ['A','B','C','D'].indexOf(cor), corEl = document.querySelector(`.opt-card:nth-child(${corIdx + 1})`);
                const isCorrect = State.quiz.selectedVal === cor;
                
                document.querySelectorAll('.opt-card').forEach(c => c.classList.add('opacity-30'));
                [State.quiz.selectedEl, corEl].forEach(c => c?.classList.remove('opacity-30'));
                
                // DESIGN REPARAT: Păstrăm chenarul dar schimbăm culoarea de bordură și fundal
                State.quiz.selectedEl.classList.remove('bg-white', 'bg-academia-goldL', 'dark:bg-slate-800', 'dark:bg-slate-900', 'border-slate-200', 'border-academia-gold', 'dark:border-slate-700');
                State.quiz.selectedEl.classList.add('text-white', isCorrect ? 'bg-emerald-500' : 'bg-rose-500', isCorrect ? 'border-emerald-500' : 'border-rose-500');
                State.quiz.selectedEl.querySelectorAll('span').forEach(s => s.classList.add('text-white', 'border-white'));

                if(!isCorrect && corEl) {
                    corEl.classList.remove('bg-white', 'dark:bg-slate-800', 'dark:bg-slate-900', 'border-slate-200', 'dark:border-slate-700');
                    corEl.classList.add('bg-emerald-500', 'border-emerald-500', 'text-white');
                    corEl.querySelectorAll('span').forEach(s => s.classList.add('text-white', 'border-white'));
                }

                State.quiz.step = 'validate'; const btn = document.getElementById('btn-action');
                btn.innerText = "Continuă \u2192"; btn.classList.add('bg-academia-gold', 'text-white');
                btn.onclick = () => { 
                    State.quiz.idx++; 
                    if(State.quiz.idx < State.quiz.pool.length) this.renderQ(); 
                    else (State.quiz.config.mode === 'EXAM' ? this.finishExam() : Router.handleBack()); 
                };
            },
            finishExam() {
                State.exam.isActive = false; clearInterval(State.exam.timer);
                let scor = 0; State.quiz.pool.forEach((q, i) => { if((State.exam.answers[q.id||i]||"") === q.raspuns_corect.trim().toUpperCase()) scor++; });
                const proc = Math.round((scor/State.quiz.pool.length)*100);
                document.getElementById('quiz-ui-container').innerHTML = `
                    <div class="text-center py-12 animate__animated animate__fadeIn">
                        <h2 class="text-4xl font-black mb-8 dark:text-white">Examen Finalizat</h2>
                        <div class="inline-flex items-center justify-center w-40 h-40 rounded-full border-[8px] border-academia-gold mb-8 shadow-xl"><span class="text-5xl font-black">${scor}/${State.quiz.pool.length}</span></div>
                        <h3 class="text-3xl font-black mb-10 dark:text-white">${proc}% Scoru tău</h3>
                        <button onclick="window.location.reload()" class="w-full max-w-md py-6 bg-academia-navy text-academia-gold rounded-[24px] font-black text-xl cursor-pointer active-scale border-none">Revenire la Dashboard</button>
                    </div>`;
                if(proc >= 70) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }
        };

        const UI = {
            openExamConfig() { document.getElementById('exam-modal').classList.remove('hidden'); },
            closeExamConfig() { document.getElementById('exam-modal').classList.add('hidden'); },
            showLobby() { document.getElementById('view-lobby').classList.remove('hidden'); this.renderSubjects(); this.updateVault(); },
            showFilter(m) { State.currentSubject = m; document.getElementById('view-filter').classList.remove('hidden'); this.renderFilters(m); },
            showQuiz() { document.getElementById('view-quiz').classList.remove('hidden'); Engine.buildPoolAndStart(); },
            renderSubjects() {
                const list = document.getElementById('subject-list'); list.innerHTML = "";
                Object.keys(db).forEach(m => {
                    const b = document.createElement('button');
                    b.className = "w-full p-6 glass-card dark:bg-slate-900 border-2 border-slate-100 dark:border-slate-800 rounded-3xl hover:border-academia-gold transition-all active-scale font-black text-xl flex justify-between items-center group cursor-pointer bg-transparent";
                    b.innerHTML = `<span class="dark:text-white">${m}</span> <span class="text-academia-gold group-hover:translate-x-2 transition-transform">&rarr;</span>`;
                    b.onclick = () => Router.navigate('materie', { subj: m });
                    list.appendChild(b);
                });
            },
            renderFilters(m) {
                document.getElementById('filter-title').innerText = m;
                const caps = {}; (db[m]||[]).forEach(q => { if(!caps[q.capitol]) caps[q.capitol] = []; if(q.subcapitol!=="General") caps[q.capitol].push(q.subcapitol); });
                const list = document.getElementById('filter-list'); list.innerHTML = "";
                Object.keys(caps).sort().forEach(cap => {
                    const id = 'c_' + Math.random().toString(36).substr(2, 9);
                    const subKeys = [...new Set(caps[cap])].sort();
                    let html = `<div class="bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl overflow-hidden mb-3">`;
                    if (subKeys.length > 0) {
                        html += `<div class="flex items-center p-5 cursor-pointer" onclick="UI.toggleAcc('${id}')"><input type="checkbox" class="cap-cb w-6 h-6 accent-academia-gold mr-4" value="${cap}" onchange="event.stopPropagation(); UI.toggleSubs('${id}', this.checked)"><span class="font-bold flex-1 dark:text-white">${cap}</span><span id="${id}_a" class="arrow-rotate text-academia-gold font-bold text-xl px-2">&#9662;</span></div><div id="${id}_w" class="accordion-content"><div class="bg-white dark:bg-slate-900 p-5 space-y-4 border-t dark:border-slate-700">${subKeys.map(s => `<label class="flex items-center gap-3 font-semibold cursor-pointer dark:text-slate-300"><input type="checkbox" class="sub-cb w-5 h-5 accent-academia-gold" value="${s}"> ${s}</label>`).join('')}</div></div>`;
                    } else { html += `<label class="flex items-center p-5 cursor-pointer"><input type="checkbox" class="cap-cb w-6 h-6 accent-academia-gold mr-4" value="${cap}"><span class="font-bold dark:text-white">${cap}</span></label>`; }
                    list.innerHTML += html + `</div>`;
                });
            },
            toggleAcc(id) { document.getElementById(id+'_w').classList.toggle('accordion-open'); document.getElementById(id+'_a').classList.toggle('rotated'); },
            toggleSubs(id, val) { document.getElementById(id+'_w').querySelectorAll('input').forEach(i => i.checked = val); },
            updateVault() { if (State.gresite.length > 0) { document.getElementById('btn-vault').classList.remove('hidden'); document.getElementById('vault-count').innerText = State.gresite.length; } },
            startSubjectMix() { Engine.startQuizConfig({ mode: 'SUBJECT_MIX' }); },
            startSelectedFilter() {
                const caps = Array.from(document.querySelectorAll('.cap-cb:checked')).map(i => i.value);
                const subs = Array.from(document.querySelectorAll('.sub-cb:checked')).map(i => i.value);
                Engine.startQuizConfig({ mode: 'SELECTED', caps, subs });
            },
            launchExam() {
                const mats = Array.from(document.querySelectorAll('.exam-mat-cb:checked')).map(i => i.value);
                const cnt = parseInt(document.getElementById('exam-count-sel').value);
                const time = parseInt(document.getElementById('exam-time-sel').value);
                this.closeExamConfig(); Engine.startQuizConfig({ mode: 'EXAM', examMats: mats, examCount: cnt, examTimeSec: time*60 });
            }
        };

        async function boot() {
            UI.applyTheme = () => { if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) document.documentElement.classList.add('dark'); };
            UI.applyTheme();
            const cache = localStorage.getItem('grile_db_premium');
            if (cache) { db = JSON.parse(cache); document.getElementById('scr-loading').classList.add('hidden'); Router.init(); }
            fetch(API_URL).then(r => r.json()).then(data => {
                db = processRawData(data);
                localStorage.setItem('grile_db_premium', JSON.stringify(db));
                if (!cache) { document.getElementById('scr-loading').classList.add('hidden'); Router.init(); }
            });
        }
        function toggleDarkMode() { const isDark = document.documentElement.classList.toggle('dark'); localStorage.setItem('theme', isDark ? 'dark' : 'light'); }
        window.addEventListener('DOMContentLoaded', boot);
    </script>
</body>
</html>
