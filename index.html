    <script>
        /**
         * CORE STATE & CONSTANTS
         */
        const API_URL = "https://script.google.com/macros/s/AKfycbybB7Loqhsu2RCI4clEmvpY7IVscyV_Kdr1TRzbNioSbhy3lGmcXDIRD9dWW8kHv0ei/exec";
        const SUPABASE_URL = 'https://mrxyaofzjhunmewqjwyr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yeHlhb2Z6amh1bm1ld3Fqd3lyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1ODI0MDEsImV4cCI6MjA5MTE1ODQwMX0.Q8Tj7CzXP4fJxaKcMP-s7wYEevuKlvp--anr0I-j7DQ';

        let supabaseClient;
        let db = {};
        
        const State = {
            currentUser: null, rawProgress: [], corecte: [], gresite: [], streak: 0, currentSubject: null,
            quiz: { pool: [], idx: 0, config: null, selectedVal: null, selectedEl: null, step: 'select', startTime: 0 },
            exam: { isActive: false, timer: null, timeLeft: 0, answers: {} }
        };

        /**
         * ROUTER SPA (History API) - Gestionează URL-urile și Ecranele
         */
        const Router = {
            init() {
                window.addEventListener('popstate', () => this.handleRoute());
                this.handleRoute(); // Execută la prima încărcare
            },
            navigate(path, params = {}) {
                const url = new URL(window.location.origin + path);
                Object.keys(params).forEach(k => url.searchParams.append(k, params[k]));
                window.history.pushState(params, "", url);
                this.handleRoute();
            },
            handleRoute() {
                const url = new URL(window.location.href);
                const page = url.searchParams.get('page') || 'lobby';
                
                // Ascundem tot
                document.querySelectorAll('.view-screen').forEach(el => el.classList.add('hidden'));
                
                // Reset UI specific
                document.getElementById('nav-back-arrow').classList.toggle('hidden', page === 'lobby');
                document.getElementById('exam-header').classList.add('hidden');
                
                // Redare pe baza rutei
                if (page === 'lobby') {
                    document.getElementById('view-lobby').classList.remove('hidden');
                    document.getElementById('view-lobby').classList.add('animate__fadeIn');
                    UI.renderLobbySubjects();
                    UI.updateLobbyVault();
                } else if (page === 'materie') {
                    State.currentSubject = url.searchParams.get('subj');
                    if(!State.currentSubject) return this.navigate('/');
                    document.getElementById('view-filter').classList.remove('hidden');
                    document.getElementById('view-filter').classList.add('animate__fadeIn');
                    UI.renderFilters(State.currentSubject);
                } else if (page === 'quiz') {
                    document.getElementById('view-quiz').classList.remove('hidden');
                    document.getElementById('view-quiz').classList.add('animate__fadeIn');
                    Engine.buildPoolAndStart();
                }
            }
        };

        /**
         * INIT & DATA PARSING
         */
        async function bootSystem() {
            if(!window.supabase) { setTimeout(bootSystem, 100); return; }
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            UI.applyTheme();
            
            const cachedData = localStorage.getItem('grile_db_premium');
            if (cachedData) { db = JSON.parse(cachedData); document.getElementById('scr-loading').classList.add('hidden'); Router.init(); }
            
            await Auth.checkSession();
            
            fetch(API_URL)
                .then(res => res.json())
                .then(data => {
                    db = Utils.processRawData(data);
                    localStorage.setItem('grile_db_premium', JSON.stringify(db));
                    if (!cachedData) { document.getElementById('scr-loading').classList.add('hidden'); Router.init(); }
                }).catch(e => console.error("Eroare DB: ", e));
        }

        const Utils = {
            processRawData(data) {
                return data.reduce((acc, item) => {
            const materie = item.materie || item.MATERIE || item.Materie;
            const enunt = item.enunt || item.ENUNT || item.Enunt;
            if (!materie || !enunt || String(enunt).trim() === "") return acc;
            
            let rawM = String(materie).trim();
            let m = rawM;
            const lowerM = rawM.toLowerCase();
            let isEcoLog = false;
            
            if (lowerM.includes('română')) m = 'Limba română';
            else if (lowerM.includes('economie')) { m = 'Economie'; isEcoLog = true; }
            else if (lowerM.includes('gândire') || lowerM.includes('logic')) { m = 'Logică'; isEcoLog = true; }

            let cap = String(item.capitol || item.CAPITOL || item.Capitol || "").trim();
            let sub = String(item.subcapitol || item.SUBCAPITOL || item.Subcapitol || item.sub || "").trim();

            let capL = cap.toLowerCase();
            let subL = sub.toLowerCase();

            // UNIFICARE CAPITOL
            if (capL.includes("gramatică") || capL.includes("gramatica")) cap = "Gramatică";
            if (capL.includes("ortografie") || capL.includes("ortoepie") || capL.includes("lexico-semantice")) {
                cap = "Ortografie, ortoepie și punctuație";
            }
            
            // UNIFICARE SUBCAPITOL (Păstrăm detaliile, dar unificăm variantele de sintaxă)
            if (subL.includes("sintaxa frazei") || subL.includes("enunțul") || subL.includes("propoziția") || subL.includes("fraza") || subL.includes("enuntul") || subL.includes("propozitia")) {
                sub = "Enunțul, propoziția și fraza";
            }
            
            // Dacă subcapitolul devine identic cu capitolul după curățare, îl facem "General" ca să nu apară dublat
            if (sub.toLowerCase().trim() === cap.toLowerCase().trim()) {
                sub = "General";
            }

            item.capitol = formatString(cap, false);
            item.subcapitol = formatString(sub, isEcoLog);
            item.computedMaterie = m;

            item.var_a = item.var_a || item.VAR_A || item.a;
            item.var_b = item.var_b || item.VAR_B || item.b;
            item.var_c = item.var_c || item.VAR_C || item.c;
            item.var_d = item.var_d || item.VAR_D || item.d;
            item.raspuns_corect = item.raspuns_corect || item.RASPUNS_CORECT || item.raspuns;

            if (!acc[m]) acc[m] = [];
            acc[m].push(item);
            return acc;
        }, {});
            },
            parseTextPremium(txt) {
                if(!txt) return "";
                let res = txt.replace(/\$/g, '').replace(/_\{([^\}]+)\}/g, '<sub>$1</sub>').replace(/_([a-zA-Z0-9])/g, '<sub>$1</sub>').replace(/\^\{([^\}]+)\}/g, '<sup>$1</sup>').replace(/\^([a-zA-Z0-9])/g, '<sup>$1</sup>').replace(/\\cdot/g, '&middot;');
                res = res.replace(/(enun[tț]ul|fraza)\s*:\s*(.*?(?:\.|\!|\?))/gi, '$1: „$2”');
                res = res.replace(/(cuv[aă]ntului)\s+["„«]?([^\s.,:;!?\)]+)["”»]?/gi, '$1 „$2”');
                const p = '<u class="decoration-academia-gold decoration-[2.5px] underline-offset-[4px] font-black">$1</u>';
                return res.replace(/\[\[u\]\](.*?)\[\[\/u\]\]/gi, p).replace(/<u[^>]*>(.*?)<\/u>/gi, p).replace(/\[\[(.*?)\]\]/g, p).replace(/\*(.*?)\*/g, p);
            }
        };

        /**
         * AUTH & PROGRESS LOGIC
         */
        const Auth = {
            async checkSession() {
                try {
                    const { data: { session } } = await supabaseClient.auth.getSession();
                    State.currentUser = session?.user || null;
                    if (State.currentUser) {
                        try { posthog.identify(State.currentUser.id, { email: State.currentUser.email }); } catch(e) {}
                        const { data } = await supabaseClient.from('user_progress').select('grila_id, status, materie, durata_secunde').eq('user_id', State.currentUser.id);
                        if (data) {
                            State.rawProgress = data;
                            State.corecte = data.filter(d => d.status === 'corect').map(d => String(d.grila_id));
                            State.gresite = data.filter(d => d.status === 'gresit').map(d => String(d.grila_id));
                        }
                        await this.updateStreak();
                    }
                    UI.updateProfileData(); UI.updateLobbyVault();
                } catch(e) { console.error("Sesiune err:", e); }
            },
            async updateStreak() {
                if (!State.currentUser) return document.getElementById('streak-container').classList.add('hidden');
                document.getElementById('streak-container').classList.remove('hidden');
                const today = new Date().toISOString().split('T')[0];
                try {
                    let { data, error } = await supabaseClient.from('user_profiles').select('last_active_date, current_streak').eq('user_id', State.currentUser.id).single();
                    if (error && error.code === 'PGRST116') { data = (await supabaseClient.from('user_profiles').insert([{ user_id: State.currentUser.id, last_active_date: today, current_streak: 1 }]).select().single()).data; }
                    if (data) {
                        let newStreak = data.current_streak; const lastDate = data.last_active_date;
                        if (lastDate !== today) {
                            const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
                            newStreak = (lastDate === yesterday.toISOString().split('T')[0]) ? newStreak + 1 : 1;
                            await supabaseClient.from('user_profiles').update({ last_active_date: today, current_streak: newStreak }).eq('user_id', State.currentUser.id);
                        }
                        State.streak = newStreak; document.getElementById('streak-count').innerText = newStreak;
                    }
                } catch (e) { console.log("Streak err"); }
            },
            async saveProgress(grilaId, materie, statusStr, durata) {
                if (!State.currentUser) return;
                const idStr = String(grilaId);
                if (statusStr === 'corect' && State.corecte.includes(idStr)) return;
                const { error } = await supabaseClient.from('user_progress').upsert({ user_id: State.currentUser.id, grila_id: idStr, materie: materie, status: statusStr, durata_secunde: durata }, { onConflict: 'user_id, grila_id' });
                if (!error) {
                    if (statusStr === 'corect') { if (!State.corecte.includes(idStr)) State.corecte.push(idStr); State.gresite = State.gresite.filter(id => id !== idStr); }
                    else { if (!State.gresite.includes(idStr)) State.gresite.push(idStr); }
                    const target = State.rawProgress.find(p => p.grila_id === idStr);
                    if (target) { target.status = statusStr; target.durata_secunde = durata; } else State.rawProgress.push({ grila_id: idStr, status: statusStr, materie: materie, durata_secunde: durata });
                    UI.updateProfileData(); UI.updateLobbyVault();
                }
            },
            async handleRegister() {
                const e = document.getElementById('auth-email').value; const p = document.getElementById('auth-password').value; const err = document.getElementById('auth-error');
                if (!e || p.length < 6) { err.innerText = "Email invalid sau parolă < 6 caractere."; err.classList.remove('hidden'); return; }
                const { error } = await supabaseClient.auth.signUp({ email: e, password: p });
                if (error) { err.innerText = error.message; err.classList.remove('hidden'); } else window.location.reload();
            },
            async handleLogin() {
                const e = document.getElementById('auth-email').value; const p = document.getElementById('auth-password').value; const err = document.getElementById('auth-error');
                const { error } = await supabaseClient.auth.signInWithPassword({ email: e, password: p });
                if (error) { err.innerText = "Date incorecte."; err.classList.remove('hidden'); } else window.location.reload();
            },
            async handleLogout() { await supabaseClient.auth.signOut(); window.location.reload(); }
        };

        /**
         * QUIZ ENGINE
         */
        const Engine = {
            startQuizConfig(config) {
                State.quiz.config = config;
                Router.navigate('/?page=quiz');
            },
            buildPoolAndStart() {
                let tempPool = [];
                const c = State.quiz.config;
                if(!c) return Router.navigate('/');

                if (c.mode === 'GLOBAL_RANDOM' || c.mode === 'ERRORS') { tempPool = [].concat(...Object.values(db)); }
                else if (c.mode === 'SUBJECT_MIX') { tempPool = db[State.currentSubject] || []; }
                else if (c.mode === 'SELECTED') { tempPool = (db[State.currentSubject] || []).filter(q => c.caps.includes(q.capitol?.trim()) || c.subs.includes(q.subcapitol?.trim())); }
                else if (c.mode === 'EXAM') {
                    if(c.examCount === 100) {
                        let g = (db['Limba română']||[]).filter(q=>q.capitol&&q.capitol.toLowerCase().includes('gramatic')).sort(()=>Math.random()-0.5).slice(0,35);
                        let o = (db['Limba română']||[]).filter(q=>q.capitol&&(q.capitol.toLowerCase().includes('ortografie')||q.capitol.toLowerCase().includes('lexic'))).sort(()=>Math.random()-0.5).slice(0,15);
                        let e = (db['Economie']||[]).sort(()=>Math.random()-0.5).slice(0,30);
                        let l = (db['Logică']||[]).sort(()=>Math.random()-0.5).slice(0,20);
                        tempPool = [...g, ...o, ...e, ...l];
                    } else {
                        c.examMats.forEach(m => tempPool.push(...(db[m] || []).sort(()=>Math.random()-0.5)));
                        tempPool = tempPool.sort(()=>Math.random()-0.5).slice(0, c.examCount);
                    }
                    State.exam.isActive = true; State.exam.timeLeft = c.examTimeSec; State.exam.answers = {};
                    document.getElementById('exam-header').classList.remove('hidden'); document.getElementById('exam-header').classList.add('flex');
                    document.getElementById('btn-abandon-quiz').innerText = 'FINALIZARE FORȚATĂ';
                    document.getElementById('btn-abandon-quiz').onclick = () => Engine.finishExam();
                    this.startExamTimer();
                }

                if (c.mode === 'ERRORS') tempPool = tempPool.filter(q => State.gresite.includes(String(q.id || q.id_grila)));
                else if (c.mode !== 'EXAM') tempPool = tempPool.filter(q => !State.corecte.includes(String(q.id || q.id_grila)));

                if (tempPool.length === 0) { alert("Nu există grile pentru selecția făcută."); return Router.navigate('/'); }
                
                State.quiz.pool = tempPool.sort(() => Math.random() - 0.5);
                State.quiz.idx = 0;
                
                // Refacem UI-ul original inainte de start
                document.getElementById('quiz-ui-container').innerHTML = window.originalQuizUI || document.getElementById('quiz-ui-container').innerHTML;
                if(!window.originalQuizUI) window.originalQuizUI = document.getElementById('quiz-ui-container').innerHTML;

                this.renderQ();
            },
            startExamTimer() {
                clearInterval(State.exam.timer);
                State.exam.timer = setInterval(() => {
                    if(!State.exam.isActive) return clearInterval(State.exam.timer);
                    State.exam.timeLeft--;
                    let m = Math.floor((State.exam.timeLeft % 3600) / 60); let s = State.exam.timeLeft % 60;
                    document.getElementById('exam-timer').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                    if(State.exam.timeLeft <= 0) Engine.finishExam();
                }, 1000);
            },
            renderQ() {
                State.quiz.startTime = Date.now(); State.quiz.step = 'select';
                const q = State.quiz.pool[State.quiz.idx];
                
                document.getElementById('q-meta').innerHTML = `${q.computedMaterie || 'Mix'} &rarr; ${q.capitol && q.capitol !== "General" ? q.capitol : 'General'}`;

                const btn = document.getElementById('btn-action'); btn.disabled = true; btn.innerText = "Trimite Răspunsul"; btn.onclick = () => Engine.submitAnswer();
                btn.className = "w-full max-w-md py-5 bg-academia-navy text-academia-gold rounded-2xl font-black text-xl disabled:opacity-20 active-scale shadow-xl cursor-pointer border-none transition-all";
                
                if (State.quiz.config.mode === 'EXAM') {
                    document.getElementById('exam-progress-text').innerText = `Grila ${State.quiz.idx + 1} din ${State.quiz.pool.length}`;
                    document.getElementById('exam-progress-bar').style.width = `${(State.quiz.idx / State.quiz.pool.length) * 100}%`;
                    if(State.quiz.idx === State.quiz.pool.length - 1) btn.innerText = "Finalizează Examenul";
                }

                let txt = q.enunt || ""; let gid = String(q.id || q.id_grila || "");
                const m = txt.match(/^\s*(\d+)[\.\-\)]\s+/); if(m) { gid = gid || m[1]; txt = txt.replace(m[0], ''); }
                
                document.getElementById('q-text').innerHTML = `<div class="font-bold text-xl md:text-2xl animate__animated animate__fadeIn">${Utils.parseTextPremium(txt)}</div>`;
                document.getElementById('q-sursa').innerText = (gid || q.sursa) ? `Sursa: ${[gid, q.sursa].filter(Boolean).join(", ")}` : "";
                
                const cont = document.getElementById('q-options'); cont.innerHTML = "";
                ['var_a', 'var_b', 'var_c', 'var_d'].forEach(k => {
                    if (!q[k]) return;
                    const letter = k.split('_')[1].toUpperCase();
                    const opt = document.createElement('div');
                    opt.className = "opt-card p-5 glass-card dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 rounded-2xl cursor-pointer font-bold flex gap-4 items-center active-scale";
                    opt.innerHTML = `<span class="w-10 h-10 rounded-xl border-2 flex items-center justify-center text-sm font-black flex-shrink-0">${letter}</span><span class="text-lg leading-snug">${Utils.parseTextPremium(String(q[k]))}</span>`;
                    opt.onclick = () => {
                        if(State.quiz.step !== 'select') return;
                        document.querySelectorAll('.opt-card').forEach(c => c.classList.remove('border-academia-gold', 'bg-academia-goldL', 'dark:bg-slate-900'));
                        opt.classList.add('border-academia-gold', 'bg-academia-goldL', 'dark:bg-slate-900');
                        State.quiz.selectedVal = letter; State.quiz.selectedEl = opt; btn.disabled = false;
                    };
                    cont.appendChild(opt);
                });
            },
            submitAnswer() {
                if (State.quiz.step !== 'select') return;
                const q = State.quiz.pool[State.quiz.idx];
                const cor = (q.raspuns_corect || "").trim().toUpperCase();
                const corIdx = ['A','B','C','D'].indexOf(cor); const corEl = document.querySelector(`.opt-card:nth-child(${corIdx + 1})`);
                
                let gid = String(q.id || q.id_grila || ""); const m = (q.enunt||"").match(/^\s*(\d+)[\.\-\)]\s+/); if (m) gid = gid || m[1];

                document.querySelectorAll('.opt-card').forEach(c => c.classList.add('opacity-30'));
                [State.quiz.selectedEl, corEl].forEach(c => c?.classList.remove('opacity-30'));
                
                const isCorrect = State.quiz.selectedVal === cor;
                State.quiz.selectedEl.classList.add('text-white');

                if (isCorrect) {
                    State.quiz.selectedEl.classList.add('bg-emerald-500', 'border-emerald-500');
                    State.quiz.selectedEl.querySelectorAll('span').forEach(s=>s.classList.add('text-white', 'border-white'));
                } else {
                    State.quiz.selectedEl.classList.add('bg-rose-500', 'border-rose-500');
                    State.quiz.selectedEl.querySelectorAll('span').forEach(s=>s.classList.add('text-white', 'border-white'));
                    if (corEl) {
                        corEl.classList.add('bg-emerald-500', 'border-emerald-500', 'text-white');
                        corEl.querySelectorAll('span').forEach(s => s.classList.add('text-white', 'border-white'));
                    }
                }

                const duration = Math.floor((Date.now() - State.quiz.startTime) / 1000);
                Auth.saveProgress(gid || State.quiz.idx, q.computedMaterie, isCorrect ? 'corect' : 'gresit', duration);
                if (State.quiz.config.mode === 'EXAM') State.exam.answers[gid || State.quiz.idx] = State.quiz.selectedVal;
                
                State.quiz.step = 'validate'; const btn = document.getElementById('btn-action');
                btn.innerText = "Continuă cu următoarea grilă \u2192"; btn.classList.add('bg-academia-gold', 'text-white');
                btn.onclick = () => { 
                    State.quiz.idx++; 
                    if (State.quiz.idx < State.quiz.pool.length) Engine.renderQ(); 
                    else (State.quiz.config.mode === 'EXAM' ? Engine.finishExam() : Router.navigate('/')); 
                };
            },
            finishExam() {
                State.exam.isActive = false; clearInterval(State.exam.timer);
                let scor = 0;
                State.quiz.pool.forEach((q, index) => {
                    let gid = String(q.id || q.id_grila || ""); const m = (q.enunt||"").match(/^\s*(\d+)[\.\-\)]\s+/); if(m) gid = gid || m[1]; gid = gid || index;
                    if ((State.exam.answers[gid] || "N/A") === (q.raspuns_corect || "").trim().toUpperCase()) scor++;
                });
                let proc = Math.round((scor / State.quiz.pool.length) * 100);
                
                document.getElementById('quiz-ui-container').innerHTML = `
                    <div class="text-center animate__animated animate__fadeIn">
                        <h2 class="text-4xl font-black mb-4">Examen Finalizat</h2>
                        <div class="inline-flex items-center justify-center w-40 h-40 rounded-full border-[8px] ${proc >= 70 ? 'border-emerald-500 text-emerald-500' : 'border-academia-gold text-academia-gold'} mb-8 shadow-xl"><span class="text-5xl font-black">${scor}/${State.quiz.pool.length}</span></div>
                        <h3 class="text-3xl font-black mb-10">${proc}% Acuratețe</h3>
                        <button onclick="Router.navigate('/')" class="w-full py-6 bg-academia-navy text-academia-gold rounded-[24px] font-black text-xl hover:shadow-lg transition-all border-none cursor-pointer">Revenire la Dashboard</button>
                    </div>`;
                if(proc >= 70 && typeof confetti === 'function') confetti({ particleCount: 200, spread: 90, origin: { y: 0.6 } });
            }
        };

        /**
         * UI DOM MANIPULATION
         */
        const UI = {
            applyTheme() { if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) document.documentElement.classList.add('dark'); },
            toggleDarkMode() { const isDark = document.documentElement.classList.toggle('dark'); localStorage.setItem('theme', isDark ? 'dark' : 'light'); },
            toggleProfileMenu() { document.getElementById('profile-menu').classList.toggle('hidden'); },
            showAuthModal() { document.getElementById('auth-modal').classList.remove('hidden'); },
            closeAuthModal() { document.getElementById('auth-modal').classList.add('hidden'); },
            openExamConfig() { document.getElementById('exam-modal').classList.remove('hidden'); },
            closeExamConfig() { document.getElementById('exam-modal').classList.add('hidden'); },
            
            updateProfileData() {
                const outDiv = document.getElementById('menu-logged-out'); const inDiv = document.getElementById('menu-logged-in');
                if (!State.currentUser) { outDiv.classList.remove('hidden'); inDiv.classList.add('hidden'); return; }
                outDiv.classList.add('hidden'); inDiv.classList.remove('hidden');
                document.getElementById('user-email-display').innerText = State.currentUser.email;
                
                const matStats = { 'Limba română': { count: 0, time: 0 }, 'Economie': { count: 0, time: 0 }, 'Logică': { count: 0, time: 0 } };
                State.rawProgress.forEach(p => { if (matStats[p.materie]) { matStats[p.materie].count++; matStats[p.materie].time += (p.durata_secunde || 0); } });
                
                let subjHtml = '';
                Object.entries(matStats).forEach(([subj, data]) => {
                    const avgTime = data.count > 0 ? Math.round(data.time / data.count) : 0;
                    const timeColor = avgTime < 45 ? 'text-emerald-500' : (avgTime < 90 ? 'text-academia-gold' : 'text-rose-500');
                    subjHtml += `<div class="mb-5 p-3 bg-white dark:bg-slate-800/50 rounded-xl border border-slate-100 dark:border-slate-700 shadow-sm"><div class="flex justify-between items-end mb-2"><div><p class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1">${subj}</p><p class="text-sm font-black dark:text-white">${data.count} <span class="text-[10px] text-slate-400 font-bold uppercase">rezolvate</span></p></div><div class="text-right"><p class="text-[9px] font-black uppercase tracking-widest text-slate-400 mb-1">Timp Mediu</p><p class="text-sm font-black ${timeColor}">${avgTime}s <span class="text-[10px] text-slate-400">/ grilă</span></p></div></div></div>`;
                });
                document.getElementById('user-stats-container').innerHTML = `<div class="p-6 bg-slate-50 dark:bg-slate-900/80 border-b border-slate-100 dark:border-slate-800 max-h-[60vh] overflow-y-auto custom-scroll"><p class="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-4">Analiză Performanță</p><div class="grid grid-cols-2 gap-3 mb-6"><div class="bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-100 dark:border-slate-700 shadow-sm"><p class="text-[10px] text-slate-400 font-black uppercase tracking-wider mb-1">Nr. Total</p><p class="text-3xl font-black text-academia-navy dark:text-white">${State.rawProgress.length}</p></div><div class="bg-white dark:bg-slate-800 p-4 rounded-xl border border-rose-100 dark:border-rose-900/50 shadow-sm"><p class="text-[10px] text-rose-400 font-black uppercase tracking-wider mb-1">Erori Active</p><p class="text-3xl font-black text-rose-600 dark:text-rose-500">${State.gresite.length}</p></div></div>${subjHtml}</div>`;
            },
            
            updateLobbyVault() {
                const vaultBtn = document.getElementById('btn-vault');
                if (State.gresite.length > 0) { vaultBtn.classList.remove('hidden'); document.getElementById('vault-count').innerText = State.gresite.length; } 
                else { vaultBtn.classList.add('hidden'); }
            },

            renderLobbySubjects() {
                const list = document.getElementById('subject-list'); list.innerHTML = "";
                Object.keys(db).forEach(m => {
                    const btn = document.createElement('button');
                    btn.className = "w-full p-6 glass-card dark:bg-slate-900 border-2 border-slate-100 dark:border-slate-800 rounded-3xl hover:border-academia-gold transition-all active-scale font-black text-xl flex justify-between items-center group shadow-sm cursor-pointer bg-transparent";
                    btn.innerHTML = `<span class="dark:text-white">${m}</span> <span class="text-academia-gold group-hover:translate-x-2 transition-transform">&rarr;</span>`;
                    btn.onclick = () => Router.navigate('/?page=materie', { subj: m });
                    list.appendChild(btn);
                });
            },

            renderFilters(m) {
                const capsData = {};
                (db[m] || []).forEach(q => {
                    const c = q.capitol || "General - Mix"; const sc = q.subcapitol || "General";
                    if (!capsData[c]) capsData[c] = { subcaps: {} };
                    if (sc !== "General") capsData[c].subcaps[sc] = 1;
                });
                
                let sortedCaps = Object.keys(capsData).sort((a, b) => a.localeCompare(b, 'ro'));
                const cont = document.getElementById('filter-list'); cont.innerHTML = "";

                sortedCaps.forEach(cap => {
                    const capId = 'cap_' + cap.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, '');
                    let html = `<div class="bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl overflow-hidden mb-3">`;
                    const subKeys = Object.keys(capsData[cap].subcaps).sort((a, b) => a.localeCompare(b, 'ro'));
                    
                    if (subKeys.length > 0) {
                        html += `<div class="flex items-center p-5 cursor-pointer select-none" onclick="UI.toggleAccordion('${capId}')"><input type="checkbox" class="cap-cb w-6 h-6 accent-academia-gold mr-4" value="${cap}" onchange="event.stopPropagation(); UI.toggleSubcaps('${capId}', this.checked)"><span class="font-bold text-lg flex-1">${cap}</span><span id="${capId}_arrow" class="arrow-rotate text-academia-gold font-bold text-xl px-2">&#9662;</span></div><div id="${capId}_wrap" class="accordion-content"><div class="bg-white dark:bg-slate-900"><div class="pl-14 pr-5 pb-5 space-y-4 border-t border-slate-200 dark:border-slate-700 pt-4">${subKeys.map(sub => `<label class="flex items-center gap-3 font-semibold cursor-pointer"><input type="checkbox" class="sub-cb w-5 h-5 accent-academia-gold" value="${sub}"> <span>${sub}</span></label>`).join('')}</div></div></div>`;
                    } else { html += `<label class="flex items-center p-5 cursor-pointer"><input type="checkbox" class="cap-cb w-6 h-6 accent-academia-gold mr-4" value="${cap}"><span class="font-bold text-lg">${cap}</span></label>`; }
                    cont.innerHTML += html + `</div>`;
                });
            },

            toggleAccordion(id) { document.getElementById(id + '_wrap')?.classList.toggle('accordion-open'); document.getElementById(id + '_arrow')?.classList.toggle('rotated'); },
            toggleSubcaps(id, isChecked) { document.getElementById(id + '_wrap')?.querySelectorAll('input').forEach(cb => cb.checked = isChecked); },
            
            startSubjectMix() { Engine.startQuizConfig({ mode: 'SUBJECT_MIX' }); },
            startSelectedFilter() {
                const selCaps = Array.from(document.querySelectorAll('.cap-cb:checked')).map(c => c.value);
                const selSubs = Array.from(document.querySelectorAll('.sub-cb:checked')).map(c => c.value);
                Engine.startQuizConfig({ mode: 'SELECTED', caps: selCaps, subs: selSubs });
            },
            launchExam() {
                const selMats = Array.from(document.querySelectorAll('.exam-mat-cb:checked')).map(cb => cb.value);
                const countVal = parseInt(document.getElementById('exam-count-sel').value);
                const timeVal = parseInt(document.getElementById('exam-time-sel').value);
                UI.closeExamConfig();
                Engine.startQuizConfig({ mode: 'EXAM', examMats: selMats, examCount: countVal, examTimeSec: timeVal * 60 });
            }
        };

        // Initialize System
        window.addEventListener('DOMContentLoaded', bootSystem);
    </script>
</body>
</html>
