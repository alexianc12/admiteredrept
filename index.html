<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admitere Drept - Platformă Grile</title>
    <meta name="description" content="Pregătire premium pentru admiterea la Drept.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { academia: { navy: '#1A2238', gold: '#C19A6B', goldL: '#FBF5E9' } },
                    fontFamily: { sans: ['Plus Jakarta Sans'], serif: ['Playfair Display'] }
                }
            }
        }
    </script>
    <style>
        .opt-card, .btn-primary, .subject-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .active-scale:active { transform: scale(0.98); }
        .accordion-content { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s ease; }
        .accordion-content > div { overflow: hidden; }
        .accordion-open { grid-template-rows: 1fr; }
        .arrow-rotate { transition: transform 0.3s ease; }
        .rotated { transform: rotate(180deg); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #C19A6B; border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
    </style>
</head>
<body class="bg-slate-50 text-academia-navy min-h-screen">
    <div id="scr-loading" class="fixed inset-0 z-[200] bg-white flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-slate-100 border-t-academia-gold rounded-full animate-spin mb-4"></div>
        <p class="text-xs font-black uppercase tracking-widest text-slate-400">Inițializare Sistem...</p>
    </div>
    <nav class="fixed top-0 w-full z-50 px-6 py-4 bg-white/95 backdrop-blur-md border-b border-slate-200 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-4">
            <button class="font-extrabold text-xl tracking-tighter uppercase bg-transparent border-none p-0 text-academia-navy cursor-pointer" onclick="navigateTo('scr-lobby')">
                <span class="text-academia-gold">GRILE</span>ADMITERE<span class="text-academia-gold">DREPT</span>
            </button>
        </div>
        <div class="relative">
            <button id="btn-profile" onclick="toggleProfileMenu()" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center hover:text-academia-gold transition-all border-none cursor-pointer">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            </button>
            <div id="profile-menu" class="hidden absolute right-0 mt-3 w-80 bg-white border border-slate-200 rounded-[24px] shadow-2xl py-0 z-50 overflow-hidden">
                <div id="menu-logged-out" class="p-4">
                    <button onclick="showAuthModal()" class="w-full py-3 bg-academia-navy text-academia-gold rounded-xl font-bold text-sm border-none cursor-pointer hover:shadow-lg transition-all">Logare / Cont Nou</button>
                </div>
                <div id="menu-logged-in" class="hidden flex flex-col">
                    <div id="user-stats-container"></div>
                    <div class="p-4 border-t border-slate-100 bg-white">
                        <p id="user-email-display" class="text-xs text-slate-400 font-bold truncate mb-3">...</p>
                        <button onclick="handleLogout()" class="w-full py-2 text-sm text-rose-500 font-bold hover:bg-rose-50 rounded-lg transition-colors border-none bg-transparent cursor-pointer text-left">Deconectare Sesiune</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    <main class="pt-24 pb-8 px-4 flex justify-center">
        <div class="w-full max-w-5xl">
            <div id="scr-error" class="hidden text-center py-20 bg-white border border-rose-200 rounded-[32px] shadow-lg max-w-2xl mx-auto">
                <h2 class="text-2xl font-bold text-rose-600 mb-2">Eroare Sistem</h2>
                <p id="error-details" class="text-slate-600 px-8 mb-6 font-medium"></p>
                <button onclick="window.location.reload()" class="px-8 py-3 bg-slate-100 rounded-xl font-bold text-sm border-none cursor-pointer hover:bg-slate-200 transition-all">Reîncearcă</button>
            </div>
            <div id="scr-lobby" class="hidden max-w-3xl mx-auto mt-6">
                <div class="text-center mb-10">
                    <h1 class="text-3xl md:text-4xl font-black text-academia-navy mb-4">Rezolvă grile pentru admitere</h1>
                </div>
                <button id="btn-global-mix" onclick="startFilteredQuiz('GLOBAL_RANDOM')" class="w-full mb-8 py-5 bg-academia-navy text-academia-gold rounded-3xl font-black text-lg md:text-xl hover:shadow-lg transition-all border-none cursor-pointer active-scale shadow-sm">
                    MIX TOATE MATERIILE (Random)
                </button>
                <div id="subject-list" class="grid gap-4 mb-6"></div>
                <div id="btn-vault" onclick="startFilteredQuiz('ERRORS')" class="hidden mt-4 mx-auto w-max px-5 py-2 bg-slate-50 hover:bg-rose-50 border border-slate-200 hover:border-rose-200 rounded-full cursor-pointer transition-all active-scale flex items-center gap-2 group shadow-sm">
                    <svg class="w-4 h-4 text-slate-400 group-hover:text-rose-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    <span class="text-sm font-bold text-slate-500 group-hover:text-rose-600 transition-colors">Revizuire: <span id="vault-count" class="text-academia-navy group-hover:text-rose-600 font-black">0</span> grile</span>
                </div>
            </div>
            <div id="scr-filter" class="hidden max-w-3xl mx-auto mt-6">
                <div class="bg-white border border-slate-200 rounded-[40px] shadow-xl p-8">
                    <h2 id="filter-title" class="text-3xl font-serif font-bold text-center mb-8 text-academia-navy"></h2>
                    <button id="btn-start-all" onclick="startFilteredQuiz('ALL')" class="w-full mb-6 py-5 bg-academia-navy text-academia-gold rounded-2xl font-black text-lg hover:shadow-lg transition-all border-none cursor-pointer active-scale">MOD EXCLUSIV (Random)</button>
                    <div id="filter-list" class="space-y-3 mb-8 max-h-[40vh] overflow-y-auto pr-2 custom-scroll"></div>
                    <button id="btn-start-sel" onclick="startFilteredQuiz('SELECTED')" class="w-full py-5 bg-academia-gold text-white rounded-2xl font-black text-lg border-none cursor-pointer hover:shadow-lg transition-all active-scale">ÎNCEPE SELECȚIA &rarr;</button>
                </div>
            </div>
            <div id="scr-quiz" class="hidden mt-2">
                <div class="bg-white border border-slate-200 rounded-[40px] shadow-2xl p-6 md:p-10 relative overflow-hidden">
                    <div id="quiz-badge-error" class="hidden absolute top-0 left-0 w-full h-2 bg-rose-500"></div>
                    <div class="flex justify-between items-center mb-6 border-b border-slate-100 pb-4">
                        <span id="q-meta" class="text-xs font-black uppercase tracking-widest text-academia-gold"></span>
                        <span id="q-mode-badge" class="hidden text-[10px] font-black uppercase tracking-widest bg-rose-100 text-rose-600 px-3 py-1 rounded-full">Mod Revizuire</span>
                    </div>
                    <div id="q-text" class="mb-8"></div>
                    <div id="q-options" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                    <div class="mt-10 flex flex-col items-center">
                        <div id="q-sursa" class="text-xs font-bold text-slate-400 mb-5 uppercase tracking-wide"></div>
                        <button id="btn-action" disabled class="w-full max-w-md py-5 bg-academia-navy text-academia-gold rounded-2xl font-black text-xl disabled:opacity-20 transition-all border-none cursor-pointer active-scale">Trimite Răspunsul</button>
                        <div id="auth-prompt" class="hidden mt-8 text-center bg-academia-goldL/50 p-6 rounded-2xl border-2 border-dashed border-academia-gold/30 w-full max-w-md animate__animated animate__fadeInUp">
                            <p id="auth-prompt-msg" class="text-lg text-slate-700 font-bold mb-3"></p>
                            <button class="text-academia-gold font-black text-xl md:text-2xl hover:underline bg-transparent border-none cursor-pointer" onclick="showAuthModal()">CREEAZĂ CONT &rarr;</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="auth-modal" class="hidden fixed inset-0 z-[100] bg-academia-navy/90 backdrop-blur-sm flex items-center justify-center p-4">
            <div class="bg-white rounded-[40px] p-10 w-full max-w-md relative animate__animated animate__zoomIn animate__faster">
                <button onclick="closeAuthModal()" class="absolute top-6 right-8 text-slate-300 hover:text-rose-500 text-3xl font-black border-none bg-transparent cursor-pointer">&times;</button>
                <h2 class="text-3xl font-serif font-bold text-center mb-2">Intră în cont</h2>
                <p class="text-center text-slate-500 mb-8 text-sm px-4">Salvează progresul</p>
                <div class="space-y-4">
                    <input id="auth-email" type="email" placeholder="Email" class="w-full px-6 py-4 rounded-xl border-2 border-slate-100 focus:border-academia-gold outline-none font-bold text-academia-navy">
                    <input id="auth-password" type="password" placeholder="Parolă" class="w-full px-6 py-4 rounded-xl border-2 border-slate-100 focus:border-academia-gold outline-none font-bold text-academia-navy">
                    <div id="auth-error" class="hidden text-rose-500 text-xs font-black text-center"></div>
                    <div class="grid grid-cols-2 gap-4 mt-2">
                        <button onclick="handleRegister()" class="py-4 bg-academia-navy text-academia-gold rounded-xl font-black hover:shadow-lg transition-all border-none cursor-pointer">Cont Nou</button>
                        <button onclick="handleLogin()" class="py-4 bg-slate-50 text-academia-navy border-2 border-slate-100 rounded-xl font-black hover:bg-white transition-all cursor-pointer">Conectare</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbybB7Loqhsu2RCI4clEmvpY7IVscyV_Kdr1TRzbNioSbhy3lGmcXDIRD9dWW8kHv0ei/exec";
    const SUPABASE_URL = 'https://mrxyaofzjhunmewqjwyr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yeHlhb2Z6amh1bm1ld3Fqd3lyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1ODI0MDEsImV4cCI6MjA5MTE1ODQwMX0.Q8Tj7CzXP4fJxaKcMP-s7wYEevuKlvp--anr0I-j7DQ';

    let supabaseClient;
    let currentUser = null;        
    let db = {};
    let state = { list: [], idx: 0, step: 'select', selectedVal: null, selectedEl: null, currentMode: null, currentSubject: null, corecte: [], gresite: [], rawProgress: [] };

    function navigateTo(id) {
        ['scr-loading', 'scr-error', 'scr-lobby', 'scr-filter', 'scr-quiz'].forEach(s => { const el = document.getElementById(s); if(el) el.classList.add('hidden'); });
        const target = document.getElementById(id);
        if(target) { target.classList.remove('hidden'); target.classList.add('animate__fadeIn'); }
    }

    document.addEventListener('click', (e) => {
        const btn = document.getElementById('btn-profile'); const menu = document.getElementById('profile-menu');
        if (btn && menu && !btn.contains(e.target) && !menu.contains(e.target)) menu.classList.add('hidden');
    });

    function toggleProfileMenu() {
        const menu = document.getElementById('profile-menu'); menu.classList.toggle('hidden');
        if (!menu.classList.contains('hidden')) updateProfileUI();
    }

    function showAuthModal() { document.getElementById('auth-modal').classList.remove('hidden'); }
    function closeAuthModal() { document.getElementById('auth-modal').classList.add('hidden'); }

    function updateLobbyUI() {
        const vaultBtn = document.getElementById('btn-vault');
        if (!vaultBtn) return;
        if (state.gresite.length > 0) {
            vaultBtn.classList.remove('hidden');
            document.getElementById('vault-count').innerText = state.gresite.length;
        } else {
            vaultBtn.classList.add('hidden');
        }
    }

    function updateProfileUI() {
        const outDiv = document.getElementById('menu-logged-out'); const inDiv = document.getElementById('menu-logged-in');
        if (!currentUser) { if(outDiv) outDiv.classList.remove('hidden'); if(inDiv) inDiv.classList.add('hidden'); return; }
        
        if(outDiv) outDiv.classList.add('hidden'); if(inDiv) inDiv.classList.remove('hidden');
        document.getElementById('user-email-display').innerText = currentUser.email;
        
        const cLen = state.corecte.length; const gLen = state.gresite.length;
        const total = cLen + gLen;
        const acc = total > 0 ? Math.round((cLen / total) * 100) : 0;
        
        let subjHtml = '';
        const matStats = { 'Limba română': 0, 'Economie': 0, 'Logică': 0 };
        state.rawProgress.forEach(p => { if (p.status === 'corect' && matStats[p.materie] !== undefined) matStats[p.materie]++; });
        
        Object.entries(matStats).forEach(([subj, count]) => {
            const subjTotal = (db[subj] && db[subj].length > 0) ? db[subj].length : 1; 
            const perc = Math.min((count / subjTotal) * 100, 100);
            subjHtml += `
                <div class="mb-4">
                    <div class="flex justify-between text-[9px] font-black uppercase tracking-wider mb-1.5 text-slate-500">
                        <span>${subj}</span><span class="text-academia-gold">${Math.round(perc)}% MASTERED</span>
                    </div>
                    <div class="w-full bg-slate-200 h-1.5 rounded-full overflow-hidden">
                        <div class="bg-academia-gold h-full transition-all duration-1000" style="width: ${perc}%"></div>
                    </div>
                </div>`;
        });

        const statsCont = document.getElementById('user-stats-container');
        if(statsCont) {
            statsCont.innerHTML = `
                <div class="p-6 bg-slate-50 border-b border-slate-100 max-h-[60vh] overflow-y-auto custom-scroll">
                    <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-4">Analiză Performanță</p>
                    <div class="grid grid-cols-2 gap-3 mb-6">
                        <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm flex flex-col justify-center">
                            <p class="text-[10px] text-slate-400 font-black uppercase tracking-wider mb-1">Rată Precizie</p>
                            <p class="text-3xl font-black text-academia-navy">${acc}%</p>
                        </div>
                        <div class="bg-white p-4 rounded-xl border border-rose-100 shadow-sm flex flex-col justify-center">
                            <p class="text-[10px] text-rose-400 font-black uppercase tracking-wider mb-1">Erori Active</p>
                            <p class="text-3xl font-black text-rose-600">${gLen}</p>
                        </div>
                    </div>
                    <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-4 mt-2">Harta Stăpânirii Bazei</p>
                    ${subjHtml}
                </div>`;
        }
    }

    async function checkSession() {
        try {
            const { data: { session } } = await supabaseClient.auth.getSession();
            currentUser = session?.user || null;
            if (currentUser) {
                const { data } = await supabaseClient.from('user_progress').select('grila_id, status, materie').eq('user_id', currentUser.id);
                if (data) {
                    state.rawProgress = data;
                    state.corecte = data.filter(d => d.status === 'corect').map(d => String(d.grila_id));
                    state.gresite = data.filter(d => d.status === 'gresit').map(d => String(d.grila_id));
                }
                document.getElementById('auth-prompt')?.classList.add('hidden');
            }
            updateProfileUI(); updateLobbyUI();
        } catch(e) {}
    }

    async function saveProgressToCloud(grilaId, materie, statusStr) {
        if (!currentUser) return;
        const idStr = String(grilaId);
        if (statusStr === 'corect' && state.corecte.includes(idStr)) return;
        
        const { error } = await supabaseClient
            .from('user_progress')
            .upsert({ user_id: currentUser.id, grila_id: idStr, materie: materie, status: statusStr }, { onConflict: 'user_id, grila_id' });
            
        if (!error) {
            if (statusStr === 'corect') {
                if (!state.corecte.includes(idStr)) state.corecte.push(idStr);
                state.gresite = state.gresite.filter(id => id !== idStr);
            } else {
                if (!state.gresite.includes(idStr)) state.gresite.push(idStr);
            }
            const target = state.rawProgress.find(p => p.grila_id === idStr);
            if (target) target.status = statusStr; else state.rawProgress.push({ grila_id: idStr, status: statusStr, materie: materie });
            updateProfileUI(); updateLobbyUI();
        }
    }

    async function handleLogin() {
        const e = document.getElementById('auth-email').value; const p = document.getElementById('auth-password').value;
        const { error } = await supabaseClient.auth.signInWithPassword({ email: e, password: p });
        if (error) { const errEl = document.getElementById('auth-error'); errEl.innerText = "Date incorecte."; errEl.classList.remove('hidden'); } 
        else { closeAuthModal(); window.location.reload(); }
    }

    async function handleRegister() {
        const e = document.getElementById('auth-email').value; const p = document.getElementById('auth-password').value;
        if (!e || p.length < 6) return;
        const { error } = await supabaseClient.auth.signUp({ email: e, password: p });
        if (error) { const errEl = document.getElementById('auth-error'); errEl.innerText = error.message; errEl.classList.remove('hidden'); } 
        else { closeAuthModal(); window.location.reload(); }
    }

    async function handleLogout() { await supabaseClient.auth.signOut(); window.location.reload(); }

    function toggleAccordion(capId) {
        const wrap = document.getElementById(capId + '_wrap');
        const arrow = document.getElementById(capId + '_arrow');
        if(wrap) wrap.classList.toggle('accordion-open');
        if(arrow) arrow.classList.toggle('rotated');
    }

    function toggleSubcaps(capId, isChecked) {
        const container = document.getElementById(capId + '_wrap');
        if(container) container.querySelectorAll('input').forEach(cb => cb.checked = isChecked);
    }

    function startFilteredQuiz(mode) {
        state.currentMode = mode;
        let pool = [];
        if (mode === 'GLOBAL_RANDOM' || mode === 'ERRORS') {
            pool = [].concat(...Object.values(db));
        } else {
            pool = db[state.currentSubject] || [];
        }
        
        if (mode === 'SELECTED') {
            const selCaps = Array.from(document.querySelectorAll('.cap-cb:checked')).map(c => c.value);
            const selSubs = Array.from(document.querySelectorAll('.sub-cb:checked')).map(c => c.value);
            pool = pool.filter(q => selCaps.includes(q.capitol?.trim()) || selSubs.includes(q.subcapitol?.trim()));
        }

        const originalPool = [...pool];
        
        pool = pool.filter(q => {
            let gid = q.id || q.id_grila || ""; const m = q.enunt.match(/^\s*(\d+)[\.\-\)]\s+/);
            if (m) gid = gid || m[1]; gid = String(gid);
            
            if (mode === 'ERRORS') return state.gresite.includes(gid);
            return !state.corecte.includes(gid) && !state.gresite.includes(gid); 
        });

        if (!pool.length && originalPool.length > 0) {
            pool = originalPool;
        }

        if (!pool.length) return;
        
        state.list = pool.sort(() => Math.random() - 0.5);
        state.idx = 0;
        navigateTo('scr-quiz'); renderQ();
    }

    function renderQ() {
        state.step = 'select';
        document.getElementById('auth-prompt').classList.add('hidden');
        const q = state.list[state.idx];
        
        let breadcrumbs = q.computedMaterie || state.currentSubject || 'Mix Global';
        if (q.capitol && q.capitol !== "General" && q.capitol !== "General - Mix") breadcrumbs += ` &rarr; ${q.capitol}`;
        if (q.subcapitol && q.subcapitol !== "General") breadcrumbs += ` &rarr; ${q.subcapitol}`;
        document.getElementById('q-meta').innerHTML = breadcrumbs;

        const btn = document.getElementById('btn-action');
        btn.disabled = true; btn.innerText = "Trimite Răspunsul"; btn.onclick = submitAnswer;
        btn.className = "w-full max-w-md py-5 bg-academia-navy text-academia-gold rounded-2xl font-black text-xl disabled:opacity-20 transition-all border-none cursor-pointer active-scale";
        
        const modeBadge = document.getElementById('q-mode-badge'); const errorBorder = document.getElementById('quiz-badge-error');
        if(state.currentMode === 'ERRORS') { modeBadge.classList.remove('hidden'); errorBorder.classList.remove('hidden'); }
        else { modeBadge.classList.add('hidden'); errorBorder.classList.add('hidden'); }
        
        let txt = q.enunt; let gid = q.id || q.id_grila || "";
        const m = txt.match(/^\s*(\d+)[\.\-\)]\s+/);
        if (m) { gid = gid || m[1]; txt = txt.replace(m[0], ''); }
        
        let hasRule1 = false;
        txt = txt.replace(/(enun[tț]ul|fraza)\s*:\s*(.*?(?:\.|\!|\?))/gi, (match, prefix, continut) => {
            hasRule1 = true;
            return `${prefix}: „${continut}”`;
        });

        if (!hasRule1) {
            txt = txt.replace(/(\(\d+\)\s*.*?(?:\.|\!|\?))/g, '„$1”');
        }

        if (q.computedMaterie === 'Logică') {
            txt = txt.replace(/\d+/g, '');
        }

        document.getElementById('q-text').innerHTML = `<div class="font-bold text-xl md:text-2xl leading-snug animate__animated animate__fadeIn text-academia-navy">${txt}</div>`;
        
        let sTxt = (gid || q.sursa) ? `Sursa: ${[gid, q.sursa].filter(Boolean).join(", ")}` : "";
        document.getElementById('q-sursa').innerText = sTxt;
        
        const cont = document.getElementById('q-options'); cont.innerHTML = "";
        ['var_a', 'var_b', 'var_c', 'var_d'].forEach(k => {
            if (!q[k]) return;
            const letter = k.split('_')[1].toUpperCase(); const opt = document.createElement('div');
            opt.className = "opt-card p-5 bg-white border-2 border-slate-100 rounded-2xl cursor-pointer font-bold flex gap-4 items-center active-scale transition-all";
            opt.innerHTML = `<span class="w-10 h-10 rounded-xl border-2 border-slate-200 flex items-center justify-center text-sm font-black text-slate-400 flex-shrink-0 transition-colors">${letter}</span><span class="text-academia-navy text-lg leading-snug transition-colors">${q[k]}</span>`;
            opt.onclick = () => {
                if(state.step !== 'select') return;
                document.querySelectorAll('.opt-card').forEach(c => c.classList.remove('border-academia-gold', 'bg-academia-goldL'));
                opt.classList.add('border-academia-gold', 'bg-academia-goldL');
                state.selectedVal = letter; state.selectedEl = opt; btn.disabled = false;
            };
            cont.appendChild(opt);
        });
    }

    function submitAnswer() {
        if (state.step !== 'select') return;
        const q = state.list[state.idx];
        const cor = q.raspuns_corect.trim().toUpperCase();
        const corIdx = ['A','B','C','D'].indexOf(cor); const corEl = document.querySelector(`.opt-card:nth-child(${corIdx + 1})`);
        
        document.querySelectorAll('.opt-card').forEach(c => c.classList.add('opacity-30'));
        [state.selectedEl, corEl].forEach(c => c?.classList.remove('opacity-30'));
        
        let gid = q.id || q.id_grila || ""; const m = q.enunt.match(/^\s*(\d+)[\.\-\)]\s+/);
        if (m) gid = gid || m[1];
        
        const isCorrect = state.selectedVal === cor;
        
        state.selectedEl.classList.remove('bg-white', 'bg-academia-goldL', 'border-slate-100', 'border-academia-gold');
        state.selectedEl.classList.add('text-white');
        state.selectedEl.querySelectorAll('span').forEach(s => s.classList.remove('text-slate-400', 'text-academia-gold', 'border-slate-200', 'border-academia-gold'));

        if (isCorrect) {
            state.selectedEl.classList.add('bg-emerald-500', 'border-emerald-500');
            state.selectedEl.querySelectorAll('span').forEach(s=>s.classList.add('text-white', 'border-white'));
            if (currentUser) saveProgressToCloud(gid || state.idx, q.computedMaterie || state.currentSubject, 'corect');
        } else {
            state.selectedEl.classList.add('bg-rose-500', 'border-rose-500');
            state.selectedEl.querySelectorAll('span').forEach(s=>s.classList.add('text-white', 'border-white'));
            
            if (corEl) {
                corEl.classList.remove('bg-white', 'border-slate-100');
                corEl.classList.add('bg-emerald-500', 'border-emerald-500', 'text-white');
                corEl.querySelectorAll('span').forEach(s => {
                    s.classList.remove('text-slate-400', 'border-slate-200');
                    s.classList.add('text-white', 'border-white');
                });
            }
            if (currentUser) saveProgressToCloud(gid || state.idx, q.computedMaterie || state.currentSubject, 'gresit');
        }
        
        if (!currentUser) {
            const prompt = document.getElementById('auth-prompt');
            const msgEl = document.getElementById('auth-prompt-msg');
            msgEl.innerText = isCorrect 
                ? "Corect! Salvează progresul pentru a nu mai primi această grilă." 
                : "Ai greșit. Creează cont pentru a o salva în Modulul de Revizuire.";
            prompt.classList.remove('hidden');
        }
        
        state.step = 'validate'; const btn = document.getElementById('btn-action');
        btn.innerText = "Continuă Navigarea \u2192"; btn.classList.add('bg-academia-gold', 'text-white');
        btn.onclick = () => { 
            state.idx++; 
            if (state.idx < state.list.length) {
                renderQ(); 
            } else { 
                goBack(); 
            } 
        };
    }

    function processRawData(data) {
        const formatString = (str, isLogic) => {
            if (!str) return "General";
            let cleaned = String(str).trim();
            if (isLogic) {
                cleaned = cleaned.replace(/\d+/g, '');
                cleaned = cleaned.replace(/^[.\-\s]+/, '').trim();
            }
            if (!cleaned) return "General";
            return cleaned.charAt(0).toUpperCase() + cleaned.slice(1);
        };

        return data.reduce((acc, item) => {
            if (!item.materie || !item.enunt || String(item.enunt).trim() === "") return acc;
            let rawM = String(item.materie).trim();
            if (rawM.toLowerCase() === 'altele') return acc;
            let m = rawM;
            const lowerM = rawM.toLowerCase();
            let isLogic = false;
            if (lowerM.includes('română')) m = 'Limba română';
            else if (lowerM.includes('economie')) { m = 'Economie'; }
            else if (lowerM.includes('gândire') || lowerM.includes('logică')) { m = 'Logică'; isLogic = true; }

            item.capOrder = parseInt((String(item.capitol || "")).match(/\d+/)) || 999;
            item.subOrder = parseInt((String(item.subcapitol || "")).match(/\d+/)) || 999;

            let rawCap = String(item.capitol || "").trim();
            let rawSub = String(item.subcapitol || "").trim();

            if (m === 'Limba română') {
                const lSub = rawSub.toLowerCase();
                if (lSub.includes('sintaxa') || lSub.includes('enunț') || lSub.includes('enunt')) {
                    rawSub = 'Sintaxa frazei';
                }
            }

            item.capitol = formatString(rawCap, isLogic);
            item.subcapitol = formatString(rawSub, isLogic);

            if (!acc[m]) acc[m] = [];
            item.computedMaterie = m;
            acc[m].push(item);
            return acc;
        }, {});
    }

    async function init() {
        try {
            if(!window.supabase) throw new Error("Dependență lipsă: Supabase CDN.");
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            await checkSession();
            const cached = localStorage.getItem('grile_db');
            if (cached) {
                db = processRawData(JSON.parse(cached));
                renderLobby();
                fetch(API_URL).then(r=>r.json()).then(data => {
                    const newDataStr = JSON.stringify(data);
                    if(cached !== newDataStr) {
                        localStorage.setItem('grile_db', newDataStr);
                        db = processRawData(data);
                        renderLobby();
                    }
                }).catch(e => {});
            } else {
                const res = await fetch(API_URL);
                if(!res.ok) throw new Error("Eroare la extragerea datelor.");
                const data = await res.json();
                localStorage.setItem('grile_db', JSON.stringify(data));
                db = processRawData(data);
                renderLobby();
            }
        } catch(e) {
            document.getElementById('error-details').innerText = e.message;
            navigateTo('scr-error');
        }
    }

    function renderLobby() {
        const list = document.getElementById('subject-list'); list.innerHTML = "";
        Object.keys(db).forEach(m => {
            const d = document.createElement('div');
            d.className = "p-6 bg-white border-2 border-slate-100 rounded-3xl cursor-pointer hover:border-academia-gold transition-all active-scale font-black text-xl flex justify-between items-center group shadow-sm";
            d.onclick = () => openFilter(m);
            d.innerHTML = `${m} <span class="text-academia-gold group-hover:translate-x-2 transition-transform">&rarr;</span>`;
            list.appendChild(d);
        });
        navigateTo('scr-lobby'); updateLobbyUI();
    }

    function openFilter(m) {
        state.currentSubject = m; document.getElementById('filter-title').innerText = m;
        const capsData = {};
        db[m].forEach(q => {
            const c = q.capitol || "General - Mix";
            const sc = q.subcapitol || "General";
            if (!capsData[c]) capsData[c] = { order: q.capOrder, subcaps: {} };
            if (q.capOrder < capsData[c].order) capsData[c].order = q.capOrder;
            if (sc !== "General") {
                if (!capsData[c].subcaps[sc]) capsData[c].subcaps[sc] = q.subOrder;
                if (q.subOrder < capsData[c].subcaps[sc]) capsData[c].subcaps[sc] = q.subOrder;
            }
        });
        let sortedCaps = Object.keys(capsData);
        if (m === 'Limba română') {
            sortedCaps.sort((a, b) => a.localeCompare(b, 'ro'));
        } else {
            sortedCaps.sort((a, b) => capsData[a].order - capsData[b].order);
        }
        const cont = document.getElementById('filter-list'); cont.innerHTML = "";
        sortedCaps.forEach(cap => {
            const capId = 'cap_' + cap.replace(/[\s\W]+/g, '');
            let html = `<div class="bg-slate-50 border border-slate-200 rounded-xl overflow-hidden mb-3">`;
            const subKeys = Object.keys(capsData[cap].subcaps);
            if (m === 'Limba română') {
                subKeys.sort((a, b) => a.localeCompare(b, 'ro'));
            } else {
                subKeys.sort((a, b) => capsData[cap].subcaps[a] - capsData[cap].subcaps[b]);
            }
            if (subKeys.length > 0) {
                html += `
                    <div class="flex items-center p-5 cursor-pointer select-none" onclick="toggleAccordion('${capId}')">
                        <input type="checkbox" class="cap-cb w-6 h-6 accent-academia-gold mr-4" value="${cap}" onchange="event.stopPropagation(); toggleSubcaps('${capId}', this.checked)">
                        <span class="font-bold text-lg text-academia-navy flex-1">${cap}</span>
                        <span id="${capId}_arrow" class="arrow-rotate text-academia-gold font-bold text-xl px-2">&#9662;</span>
                    </div>
                    <div id="${capId}_wrap" class="accordion-content">
                        <div class="bg-white">
                            <div class="pl-14 pr-5 pb-5 space-y-4 border-t border-slate-200 pt-4">
                                ${subKeys.map(sub => `
                                    <label class="flex items-center gap-3 text-slate-600 font-semibold cursor-pointer active:opacity-70 transition-opacity text-base">
                                        <input type="checkbox" class="sub-cb w-5 h-5 accent-academia-gold" value="${sub}"> <span class="leading-tight">${sub}</span>
                                    </label>
                                `).join('')}
                            </div>
                        </div>
                    </div>`;
            } else {
                html += `<label class="flex items-center p-5 cursor-pointer"><input type="checkbox" class="cap-cb w-6 h-6 accent-academia-gold mr-4" value="${cap}"><span class="font-bold text-lg">${cap}</span></label>`;
            }
            html += `</div>`;
            cont.innerHTML += html;
        });
        navigateTo('scr-filter');
    }

    window.addEventListener('DOMContentLoaded', init);
    window.addEventListener('popstate', (e) => { navigateTo('scr-lobby'); });
    function goBack() { navigateTo('scr-lobby'); }
</script>
