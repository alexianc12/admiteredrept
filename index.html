<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grile Admitere Drept UB | Platformă Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js" defer></script>
    
    <script>
        tailwind.config = { 
            darkMode: 'class', 
            theme: { 
                extend: { 
                    colors: { academia: { navy: '#1A2238', gold: '#C19A6B', goldL: '#FBF5E9' } }, 
                    fontFamily: { sans: ['Plus Jakarta Sans'] } 
                } 
            } 
        }
    </script>
    <style>
        .opt-card, .btn-primary { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .active-scale:active { transform: scale(0.98); }
        .accordion-content { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s ease; }
        .accordion-content > div { overflow: hidden; }
        .accordion-open { grid-template-rows: 1fr; }
        .arrow-rotate { transition: transform 0.3s ease; } .rotated { transform: rotate(180deg); }
        ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: #C19A6B; border-radius: 10px; }
        :root { --glass: rgba(255, 255, 255, 0.85); --glass-border: rgba(255, 255, 255, 0.4); }
        .dark { --glass: rgba(26, 34, 56, 0.85); --glass-border: rgba(255, 255, 255, 0.1); }
        .glass-card { background: var(--glass); backdrop-filter: blur(8px); border: 1px solid var(--glass-border); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-academia-navy dark:text-slate-100 min-h-screen transition-colors duration-300 font-sans">
    
    <div id="scr-loading" class="fixed inset-0 z-[200] bg-white dark:bg-slate-950 flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-slate-100 dark:border-slate-800 border-t-academia-gold rounded-full animate-spin mb-4"></div>
        <p class="text-xs font-black uppercase tracking-widest text-slate-400">Sincronizare Bază de Date...</p>
    </div>

    <nav id="main-nav" class="fixed top-0 w-full z-50 px-6 py-4 glass-card border-b border-slate-200 dark:border-slate-800 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-4">
            <button class="font-black text-xl tracking-tighter uppercase bg-transparent border-none p-0 text-academia-navy dark:text-white cursor-pointer" onclick="Router.handleBack()">
                <span id="nav-back-arrow" class="hidden text-academia-gold mr-2">&larr;</span><span class="text-academia-gold">GRILE</span>ADMITERE<span class="text-academia-gold">DREPT</span>
            </button>
        </div>
        <div class="flex items-center gap-3">
            <div id="streak-container" class="hidden flex items-center gap-1.5 bg-orange-50 dark:bg-orange-900/20 px-3 py-1.5 rounded-full border border-orange-100 dark:border-orange-800">
                <span class="text-orange-500 text-sm">🔥</span><span id="streak-count" class="font-black text-orange-600 dark:text-orange-400 text-sm">0</span>
            </div>
            <button onclick="UI.toggleDarkMode()" class="text-academia-gold bg-transparent border-none cursor-pointer hover:scale-110"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg></button>
            <button onclick="UI.toggleProfileMenu()" class="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center hover:text-academia-gold transition-all border-none cursor-pointer"><svg class="w-5 h-5 dark:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg></button>
            
            <div id="profile-menu" class="hidden absolute right-0 top-full mt-3 w-80 glass-card dark:bg-slate-900 border rounded-[24px] shadow-2xl py-0 z-50 overflow-hidden">
                <div id="menu-logged-out" class="p-4"><button onclick="UI.showAuthModal()" class="w-full py-3 bg-academia-navy text-academia-gold rounded-xl font-bold text-sm cursor-pointer border-none">Logare / Cont Nou</button></div>
                <div id="menu-logged-in" class="hidden flex flex-col"><div id="user-stats-container"></div><div class="p-5 border-t bg-white/50 dark:bg-slate-800/50 rounded-b-[24px]"><p id="user-email-display" class="text-xs text-slate-400 font-bold truncate mb-3">...</p><button onclick="Auth.handleLogout()" class="w-full py-2 text-sm text-rose-500 font-bold text-left cursor-pointer border-none bg-transparent">Deconectare Sesiune</button></div></div>
            </div>
        </div>
    </nav>

    <main class="pt-24 pb-8 px-4 flex justify-center">
        <div class="w-full max-w-5xl">
            
            <div id="view-lobby" class="view-screen hidden max-w-3xl mx-auto mt-6">
                <div class="text-center mb-10"><h1 class="text-3xl md:text-4xl font-black mb-4">Rezolvă grile pentru admitere</h1></div>
                <button onclick="Engine.startQuiz({mode: 'GLOBAL_RANDOM'})" class="w-full mb-4 py-5 bg-academia-navy text-academia-gold rounded-3xl font-black text-lg active-scale border-none cursor-pointer shadow-sm">MIX TOATE MATERIILE (Random)</button>
                <button onclick="UI.openExamConfig()" class="w-full mb-8 py-5 bg-gradient-to-r from-academia-gold to-yellow-600 text-white rounded-3xl font-black text-lg active-scale flex justify-center items-center gap-3 border-none cursor-pointer">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> SIMULARE EXAMEN (Focus Mode)
                </button>
                <div id="subject-list" class="grid gap-4 mb-6"></div>
                <div id="btn-vault" onclick="Engine.startQuiz({mode: 'ERRORS'})" class="hidden mt-4 mx-auto w-max px-5 py-2 glass-card rounded-full cursor-pointer active-scale flex items-center gap-2">
                    <span class="text-sm font-bold text-slate-500">Revizuire: <span id="vault-count" class="text-academia-gold font-black">0</span> grile</span>
                </div>
            </div>

            <div id="view-filter" class="view-screen hidden max-w-3xl mx-auto mt-6">
                <div class="glass-card dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[40px] shadow-xl p-8">
                    <h2 id="filter-title" class="text-3xl font-black text-center mb-8">Materie</h2>
                    <button onclick="UI.startSubjectMix()" class="w-full mb-6 py-5 bg-academia-navy text-academia-gold rounded-2xl font-black text-lg active-scale border-none cursor-pointer">MOD EXCLUSIV (Random)</button>
                    <div id="filter-list" class="space-y-3 mb-8 max-h-[50vh] overflow-y-auto pr-2 custom-scroll"></div>
                    <button onclick="UI.startSelectedFilter()" class="w-full py-5 bg-academia-gold text-white rounded-2xl font-black text-lg active-scale border-none cursor-pointer shadow-lg">ÎNCEPE REZOLVAREA &rarr;</button>
                </div>
            </div>

            <div id="view-quiz" class="view-screen hidden mt-2">
                <div class="glass-card dark:bg-slate-900 border rounded-[40px] shadow-2xl p-6 md:p-10 relative overflow-hidden" id="quiz-ui-container">
                    <div id="exam-header" class="hidden flex-col mb-6 bg-slate-50 dark:bg-slate-800/50 p-4 rounded-2xl border border-slate-100 dark:border-slate-700">
                        <div class="flex justify-between items-center mb-2"><span id="exam-progress-text" class="text-xs font-black uppercase text-slate-500">Grila 1</span><span id="exam-timer" class="text-lg font-black text-rose-500 font-mono tracking-wider">00:00</span></div>
                        <div class="w-full bg-slate-200 dark:bg-slate-700 h-1.5 rounded-full overflow-hidden"><div id="exam-progress-bar" class="bg-academia-gold h-full transition-all duration-300" style="width: 0%"></div></div>
                    </div>
                    <div class="flex justify-between items-center mb-6 border-b border-slate-100 dark:border-slate-800 pb-4">
                        <span id="q-meta" class="text-[10px] font-black uppercase tracking-widest text-academia-gold">...</span>
                    </div>
                    <div id="q-text" class="mb-8"></div>
                    <div id="q-options" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                    <div class="mt-10 flex flex-col items-center">
                        <div id="q-sursa" class="text-[10px] font-bold text-slate-400 mb-5 uppercase tracking-wide text-center"></div>
                        <button id="btn-action" disabled class="w-full max-w-md py-5 bg-academia-navy text-academia-gold rounded-2xl font-black text-xl disabled:opacity-20 active-scale border-none cursor-pointer">Trimite Răspunsul</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="auth-modal" class="hidden fixed inset-0 z-[100] bg-academia-navy/90 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="glass-card dark:bg-slate-900 rounded-[40px] p-10 w-full max-w-md relative border-none shadow-2xl">
            <button onclick="UI.closeAuthModal()" class="absolute top-6 right-8 text-slate-300 hover:text-rose-500 text-3xl font-black border-none bg-transparent cursor-pointer">&times;</button>
            <h2 class="text-3xl font-black text-center mb-8">Contul meu</h2>
            <div class="space-y-4">
                <input id="auth-email" type="email" placeholder="Email" class="w-full px-6 py-4 rounded-xl border-2 dark:border-slate-800 dark:bg-slate-800 font-bold outline-none focus:border-academia-gold transition-colors">
                <input id="auth-password" type="password" placeholder="Parolă" class="w-full px-6 py-4 rounded-xl border-2 dark:border-slate-800 dark:bg-slate-800 font-bold outline-none focus:border-academia-gold transition-colors">
                <div id="auth-error" class="hidden text-rose-500 text-xs font-black text-center"></div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="Auth.handleRegister()" class="py-4 bg-academia-navy text-academia-gold rounded-xl font-black cursor-pointer border-none active-scale">Cont Nou</button>
                    <button onclick="Auth.handleLogin()" class="py-4 bg-slate-50 dark:bg-slate-800 border-2 dark:border-slate-700 rounded-xl font-black cursor-pointer active-scale">Logare</button>
                </div>
            </div>
        </div>
    </div>

    <div id="exam-modal" class="hidden fixed inset-0 z-[90] bg-academia-navy/90 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="glass-card dark:bg-slate-900 rounded-[40px] p-8 w-full max-w-lg relative border-none shadow-2xl">
            <button onclick="UI.closeExamConfig()" class="absolute top-6 right-8 text-slate-300 hover:text-rose-500 text-3xl font-black border-none bg-transparent cursor-pointer">&times;</button>
            <h2 class="text-3xl font-black text-center mb-6">Configurare Examen</h2>
            <div class="space-y-6">
                <div class="grid grid-cols-1 gap-2">
                    <label class="flex items-center gap-3 p-3 bg-slate-50 dark:bg-slate-800 rounded-xl cursor-pointer"><input type="checkbox" class="exam-mat-cb w-5 h-5 accent-academia-gold" value="Limba română" checked> <span class="font-bold">Limba română</span></label>
                    <label class="flex items-center gap-3 p-3 bg-slate-50 dark:bg-slate-800 rounded-xl cursor-pointer"><input type="checkbox" class="exam-mat-cb w-5 h-5 accent-academia-gold" value="Economie" checked> <span class="font-bold">Economie</span></label>
                    <label class="flex items-center gap-3 p-3 bg-slate-50 dark:bg-slate-800 rounded-xl cursor-pointer"><input type="checkbox" class="exam-mat-cb w-5 h-5 accent-academia-gold" value="Logică" checked> <span class="font-bold">Logică</span></label>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <select id="exam-time-sel" class="p-4 rounded-xl bg-slate-50 dark:bg-slate-800 font-bold outline-none border-none cursor-pointer"><option value="30" selected>30 Minute</option><option value="60">60 Minute</option></select>
                    <select id="exam-count-sel" class="p-4 rounded-xl bg-slate-50 dark:bg-slate-800 font-bold outline-none border-none cursor-pointer"><option value="30" selected>30 Grile</option><option value="100">100 Grile</option></select>
                </div>
                <button onclick="UI.launchExam()" class="w-full py-5 bg-academia-gold text-white rounded-2xl font-black text-lg cursor-pointer border-none shadow-lg active-scale">Lansează Examenul</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * GLOBAL STATE
         */
        const State = {
            currentUser: null, rawProgress: [], corecte: [], gresite: [], streak: 0, currentSubject: null,
            quiz: { pool: [], idx: 0, config: null, selectedVal: null, selectedEl: null, step: 'select', startTime: 0 },
            exam: { isActive: false, timer: null, timeLeft: 0, answers: {} }
        };

        let supabaseClient, db = {};

        /**
         * ROUTER (HASH BASED)
         */
        const Router = {
            init() { 
                window.addEventListener('hashchange', () => this.handleRoute()); 
                if(!window.location.hash) window.location.hash = 'lobby'; else this.handleRoute(); 
            },
            navigate(page, params = {}) {
                const sp = new URLSearchParams(); Object.keys(params).forEach(k => sp.append(k, params[k]));
                window.location.hash = sp.toString() ? `${page}?${sp.toString()}` : page;
            },
            handleBack() {
                const [page] = window.location.hash.replace('#', '').split('?');
                if (page === 'quiz' && State.quiz.config?.subject) {
                    this.navigate('materie', { subj: State.quiz.config.subject });
                } else {
                    this.navigate('lobby');
                }
            },
            handleRoute() {
                const [page, qs] = window.location.hash.replace('#', '').split('?');
                const params = new URLSearchParams(qs || '');
                document.querySelectorAll('.view-screen').forEach(el => el.classList.add('hidden'));
                document.getElementById('nav-back-arrow').classList.toggle('hidden', page === 'lobby');
                
                if (page === 'lobby') { UI.showLobby(); }
                else if (page === 'materie') { UI.showFilter(params.get('subj')); }
                else if (page === 'quiz') { UI.showQuiz(); }
            }
        };

        /**
         * DATA UTILS (Integrated processRawData)
         */
        const Utils = {
            processRawData(data) {
                const formatString = (str, isEcoLog) => {
                    if (isEcoLog) return "General";
                    if (!str) return "General";
                    let cleaned = String(str).trim();
                    if (!cleaned || cleaned.toLowerCase() === "general") return "General";
                    return cleaned.charAt(0).toUpperCase() + cleaned.slice(1);
                };

                return data.reduce((acc, item) => {
                    const materie = item.materie || item.MATERIE || item.Materie;
                    const enunt = item.enunt || item.ENUNT || item.Enunt;
                    if (!materie || !enunt || String(enunt).trim() === "") return acc;
                    
                    let rawM = String(materie).trim();
                    let m = rawM;
                    const lowerM = rawM.toLowerCase();
                    let isEcoLog = false;
                    
                    if (lowerM.includes('română')) m = 'Limba română';
                    else if (lowerM.includes('economie')) { m = 'Economie'; isEcoLog = true; }
                    else if (lowerM.includes('gândire') || lowerM.includes('logic')) { m = 'Logică'; isEcoLog = true; }

                    let cap = String(item.capitol || item.CAPITOL || item.Capitol || "").trim();
                    let sub = String(item.subcapitol || item.SUBCAPITOL || item.Subcapitol || item.sub || "").trim();

                    let capL = cap.toLowerCase();
                    let subL = sub.toLowerCase();

                    // UNIFICARE CAPITOL
                    if (capL.includes("gramatică") || capL.includes("gramatica")) cap = "Gramatică";
                    if (capL.includes("ortografie") || capL.includes("ortoepie") || capL.includes("lexico-semantice")) {
                        cap = "Ortografie, ortoepie și punctuație";
                    }
                    
                    // UNIFICARE SUBCAPITOL
                    if (subL.includes("sintaxa frazei") || subL.includes("enunțul") || subL.includes("propoziția") || subL.includes("fraza") || subL.includes("enuntul") || subL.includes("propozitia")) {
                        sub = "Enunțul, propoziția și fraza";
                    }
                    
                    if (sub.toLowerCase().trim() === cap.toLowerCase().trim()) sub = "General";

                    item.capitol = formatString(cap, false);
                    item.subcapitol = formatString(sub, isEcoLog);
                    item.computedMaterie = m;

                    item.var_a = item.var_a || item.VAR_A || item.a;
                    item.var_b = item.var_b || item.VAR_B || item.b;
                    item.var_c = item.var_c || item.VAR_C || item.c;
                    item.var_d = item.var_d || item.VAR_D || item.d;
                    item.raspuns_corect = item.raspuns_corect || item.RASPUNS_CORECT || item.raspuns;

                    if (!acc[m]) acc[m] = [];
                    acc[m].push(item);
                    return acc;
                }, {});
            },
            parsePremiumText(txt) {
                if(!txt) return "";
                let res = txt.replace(/\$/g, '').replace(/_\{([^\}]+)\}/g, '<sub>$1</sub>').replace(/\^\{([^\}]+)\}/g, '<sup>$1</sup>');
                const premiumTag = '<u class="decoration-academia-gold decoration-[2px] underline-offset-[3px] font-black">$1</u>';
                return res.replace(/\[\[u\]\](.*?)\[\[\/u\]\]/gi, premiumTag).replace(/\[\[(.*?)\]\]/g, premiumTag).replace(/\*(.*?)\*/g, premiumTag);
            }
        };

        /**
         * AUTH & PROGRESS
         */
        const Auth = {
            async checkSession() {
                const { data: { session } } = await supabaseClient.auth.getSession();
                State.currentUser = session?.user || null;
                if (State.currentUser) {
                    const { data } = await supabaseClient.from('user_progress').select('*').eq('user_id', State.currentUser.id);
                    if (data) {
                        State.rawProgress = data;
                        State.corecte = data.filter(d => d.status === 'corect').map(d => String(d.grila_id));
                        State.gresite = data.filter(d => d.status === 'gresit').map(d => String(d.grila_id));
                    }
                    await this.updateStreak();
                }
                UI.updateLobbyVault(); UI.updateProfileUI();
            },
            async updateStreak() {
                if (!State.currentUser) return;
                const today = new Date().toISOString().split('T')[0];
                let { data } = await supabaseClient.from('user_profiles').select('*').eq('user_id', State.currentUser.id).single();
                if (!data) data = (await supabaseClient.from('user_profiles').insert([{ user_id: State.currentUser.id, last_active_date: today, current_streak: 1 }]).select().single()).data;
                if (data) {
                    let streak = data.current_streak;
                    const last = data.last_active_date;
                    if (last !== today) {
                        const yest = new Date(); yest.setDate(yest.getDate() - 1);
                        streak = (last === yest.toISOString().split('T')[0]) ? streak + 1 : 1;
                        await supabaseClient.from('user_profiles').update({ last_active_date: today, current_streak: streak }).eq('user_id', State.currentUser.id);
                    }
                    State.streak = streak; document.getElementById('streak-count').innerText = streak;
                    document.getElementById('streak-container').classList.remove('hidden');
                }
            },
            async saveProgress(gid, mat, status, dur) {
                if (!State.currentUser) return;
                const { error } = await supabaseClient.from('user_progress').upsert({ user_id: State.currentUser.id, grila_id: String(gid), materie: mat, status, durata_secunde: dur }, { onConflict: 'user_id, grila_id' });
                if (!error) {
                    if (status === 'corect') { if (!State.corecte.includes(String(gid))) State.corecte.push(String(gid)); State.gresite = State.gresite.filter(i => i !== String(gid)); }
                    else { if (!State.gresite.includes(String(gid))) State.gresite.push(String(gid)); }
                    UI.updateLobbyVault(); UI.updateProfileUI();
                }
            },
            async handleLogin() {
                const e = document.getElementById('auth-email').value, p = document.getElementById('auth-password').value;
                const { error } = await supabaseClient.auth.signInWithPassword({ email: e, password: p });
                if (error) alert(error.message); else window.location.reload();
            },
            async handleRegister() {
                const e = document.getElementById('auth-email').value, p = document.getElementById('auth-password').value;
                const { error } = await supabaseClient.auth.signUp({ email: e, password: p });
                if (error) alert(error.message); else window.location.reload();
            },
            async handleLogout() { await supabaseClient.auth.signOut(); window.location.reload(); }
        };

        /**
         * ENGINE
         */
        const Engine = {
            startQuiz(c) { State.quiz.config = c; if (State.currentSubject) State.quiz.config.subject = State.currentSubject; Router.navigate('quiz'); },
            buildPoolAndStart() {
                let pool = []; const c = State.quiz.config;
                if (c.mode === 'GLOBAL_RANDOM' || c.mode === 'ERRORS') pool = [].concat(...Object.values(db));
                else if (c.mode === 'SUBJECT_MIX') pool = db[State.currentSubject] || [];
                else if (c.mode === 'SELECTED') pool = (db[State.currentSubject] || []).filter(q => c.caps.includes(q.capitol?.trim()) || c.subs.includes(q.subcapitol?.trim()));
                else if (c.mode === 'EXAM') {
                    c.examMats.forEach(m => pool.push(...(db[m] || []))); 
                    pool = pool.sort(() => Math.random() - 0.5).slice(0, c.examCount);
                    State.exam.isActive = true; State.exam.timeLeft = c.examTimeSec; State.exam.answers = {};
                    document.getElementById('exam-header').classList.remove('hidden'); document.getElementById('exam-header').classList.add('flex');
                    this.startTimer();
                }
                if (c.mode === 'ERRORS') pool = pool.filter(q => State.gresite.includes(String(q.id || q.id_grila)));
                else if (c.mode !== 'EXAM') pool = pool.filter(q => !State.corecte.includes(String(q.id || q.id_grila)));
                
                if (!pool.length) { alert("Nu există grile conform selecției."); return Router.navigate('lobby'); }
                State.quiz.pool = pool.sort(() => Math.random() - 0.5); State.quiz.idx = 0;
                this.renderQ();
            },
            startTimer() {
                clearInterval(State.exam.timer);
                State.exam.timer = setInterval(() => {
                    if(!State.exam.isActive) return clearInterval(State.exam.timer);
                    State.exam.timeLeft--;
                    let m = Math.floor(State.exam.timeLeft / 60), s = State.exam.timeLeft % 60;
                    document.getElementById('exam-timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                    if(State.exam.timeLeft <= 0) this.finishExam();
                }, 1000);
            },
            renderQ() {
                State.quiz.startTime = Date.now(); State.quiz.step = 'select';
                const q = State.quiz.pool[State.quiz.idx];
                document.getElementById('q-meta').innerHTML = `${q.computedMaterie} &rarr; ${q.capitol}`;
                document.getElementById('q-text').innerHTML = `<div class="font-bold text-xl md:text-2xl animate__animated animate__fadeIn">${Utils.parsePremiumText(q.enunt)}</div>`;
                
                const btn = document.getElementById('btn-action'); btn.disabled = true; btn.innerText = "Trimite Răspunsul"; btn.onclick = () => this.submit();
                
                if (State.quiz.config.mode === 'EXAM') {
                    document.getElementById('exam-progress-text').innerText = `Grila ${State.idx + 1} / ${State.pool.length}`;
                    document.getElementById('exam-progress-bar').style.width = `${(State.quiz.idx / State.quiz.pool.length)*100}%`;
                }

                const cont = document.getElementById('q-options'); cont.innerHTML = "";
                ['var_a', 'var_b', 'var_c', 'var_d'].forEach(k => {
                    if (!q[k]) return;
                    const letter = k.split('_')[1].toUpperCase();
                    const opt = document.createElement('div');
                    opt.className = "opt-card p-5 glass-card dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 rounded-2xl cursor-pointer font-bold flex gap-4 items-center active-scale";
                    opt.innerHTML = `<span class="w-10 h-10 rounded-xl border-2 flex items-center justify-center text-sm font-black flex-shrink-0">${letter}</span><span class="text-lg">${Utils.parsePremiumText(String(q[k]))}</span>`;
                    opt.onclick = () => {
                        if(State.quiz.step !== 'select') return;
                        document.querySelectorAll('.opt-card').forEach(c => c.classList.remove('border-academia-gold', 'bg-academia-goldL', 'dark:bg-slate-900'));
                        opt.classList.add('border-academia-gold', 'bg-academia-goldL', 'dark:bg-slate-900');
                        State.quiz.selectedVal = letter; State.quiz.selectedEl = opt; btn.disabled = false;
                    };
                    cont.appendChild(opt);
                });
            },
            submit() {
                if (State.quiz.step !== 'select') return;
                const q = State.quiz.pool[State.quiz.idx], cor = (q.raspuns_corect || "").trim().toUpperCase();
                const corIdx = ['A','B','C','D'].indexOf(cor), corEl = document.querySelector(`.opt-card:nth-child(${corIdx + 1})`);
                const isCorrect = State.quiz.selectedVal === cor;
                
                document.querySelectorAll('.opt-card').forEach(c => c.classList.add('opacity-30'));
                [State.quiz.selectedEl, corEl].forEach(c => c?.classList.remove('opacity-30'));
                State.quiz.selectedEl.classList.add('text-white', isCorrect ? 'bg-emerald-500' : 'bg-rose-500', isCorrect ? 'border-emerald-500' : 'border-rose-500');
                if(!isCorrect && corEl) corEl.classList.add('bg-emerald-500', 'border-emerald-500', 'text-white');

                Auth.saveProgress(q.id || State.quiz.idx, q.computedMaterie, isCorrect ? 'corect' : 'gresit', Math.floor((Date.now()-State.quiz.startTime)/1000));
                
                State.quiz.step = 'validate'; const btn = document.getElementById('btn-action');
                btn.innerText = "Următoarea Grilă \u2192"; btn.classList.add('bg-academia-gold', 'text-white');
                btn.onclick = () => { State.quiz.idx++; if(State.quiz.idx < State.quiz.pool.length) this.renderQ(); else (State.quiz.config.mode === 'EXAM' ? this.finishExam() : Router.handleBack()); };
            },
            finishExam() {
                State.exam.isActive = false; clearInterval(State.exam.timer);
                let scor = 0; State.quiz.pool.forEach((q, i) => { if((State.exam.answers[q.id||i]||"") === q.raspuns_corect.trim().toUpperCase()) scor++; });
                const proc = Math.round((scor/State.quiz.pool.length)*100);
                document.getElementById('quiz-ui-container').innerHTML = `<div class="text-center py-12 animate__animated animate__fadeIn"><h2 class="text-4xl font-black mb-8">Examen Finalizat</h2><div class="inline-flex items-center justify-center w-40 h-40 rounded-full border-[8px] border-academia-gold mb-8 shadow-xl"><span class="text-5xl font-black">${scor}/${State.quiz.pool.length}</span></div><h3 class="text-3xl font-black mb-10">${proc}% Scoru tău</h3><button onclick="Router.navigate('lobby')" class="w-full max-w-md py-6 bg-academia-navy text-academia-gold rounded-[24px] font-black text-xl cursor-pointer active-scale border-none">Dashboard</button></div>`;
                if(proc >= 70) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }
        };

        /**
         * UI COMPONENTS
         */
        const UI = {
            applyTheme() { if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) document.documentElement.classList.add('dark'); },
            toggleDarkMode() { const isDark = document.documentElement.classList.toggle('dark'); localStorage.setItem('theme', isDark ? 'dark' : 'light'); },
            toggleProfileMenu() { document.getElementById('profile-menu').classList.toggle('hidden'); },
            showAuthModal() { document.getElementById('auth-modal').classList.remove('hidden'); },
            closeAuthModal() { document.getElementById('auth-modal').classList.add('hidden'); },
            openExamConfig() { document.getElementById('exam-modal').classList.remove('hidden'); },
            closeExamConfig() { document.getElementById('exam-modal').classList.add('hidden'); },
            
            showLobby() { document.getElementById('view-lobby').classList.remove('hidden'); this.renderSubjects(); },
            showFilter(m) { State.currentSubject = m; document.getElementById('view-filter').classList.remove('hidden'); this.renderFilters(m); },
            showQuiz() { document.getElementById('view-quiz').classList.remove('hidden'); Engine.buildPoolAndStart(); },

            renderSubjects() {
                const list = document.getElementById('subject-list'); list.innerHTML = "";
                Object.keys(db).forEach(m => {
                    const b = document.createElement('button');
                    b.className = "w-full p-6 glass-card dark:bg-slate-900 border-2 border-slate-100 dark:border-slate-800 rounded-3xl hover:border-academia-gold transition-all active-scale font-black text-xl flex justify-between items-center group cursor-pointer bg-transparent";
                    b.innerHTML = `<span>${m}</span> <span class="text-academia-gold group-hover:translate-x-2 transition-transform">&rarr;</span>`;
                    b.onclick = () => Router.navigate('materie', { subj: m });
                    list.appendChild(b);
                });
            },
            renderFilters(m) {
                document.getElementById('filter-title').innerText = m;
                const caps = {}; (db[m]||[]).forEach(q => { if(!caps[q.capitol]) caps[q.capitol] = []; if(q.subcapitol!=="General") caps[q.capitol].push(q.subcapitol); });
                const list = document.getElementById('filter-list'); list.innerHTML = "";
                Object.keys(caps).forEach(cap => {
                    const id = 'c_' + Math.random().toString(36).substr(2, 9);
                    const subKeys = [...new Set(caps[cap])].sort();
                    let html = `<div class="bg-slate-50 dark:bg-slate-800/50 border rounded-xl overflow-hidden mb-3">`;
                    if (subKeys.length > 0) {
                        html += `<div class="flex items-center p-5 cursor-pointer" onclick="UI.toggleAcc('${id}')"><input type="checkbox" class="cap-cb w-6 h-6 accent-academia-gold mr-4" value="${cap}" onchange="event.stopPropagation(); UI.toggleSubs('${id}', this.checked)"><span class="font-bold flex-1">${cap}</span><span id="${id}_a" class="arrow-rotate text-academia-gold font-bold text-xl px-2">&#9662;</span></div><div id="${id}_w" class="accordion-content"><div class="bg-white dark:bg-slate-900 p-5 space-y-4 border-t">${subKeys.map(s => `<label class="flex items-center gap-3 font-semibold cursor-pointer"><input type="checkbox" class="sub-cb w-5 h-5 accent-academia-gold" value="${s}"> ${s}</label>`).join('')}</div></div>`;
                    } else { html += `<label class="flex items-center p-5 cursor-pointer"><input type="checkbox" class="cap-cb w-6 h-6 accent-academia-gold mr-4" value="${cap}"><span class="font-bold">${cap}</span></label>`; }
                    list.innerHTML += html + `</div>`;
                });
            },
            toggleAcc(id) { document.getElementById(id+'_w').classList.toggle('accordion-open'); document.getElementById(id+'_a').classList.toggle('rotated'); },
            toggleSubs(id, val) { document.getElementById(id+'_w').querySelectorAll('input').forEach(i => i.checked = val); },
            updateLobbyVault() { const v = document.getElementById('btn-vault'); if (State.gresite.length > 0) { v.classList.remove('hidden'); document.getElementById('vault-count').innerText = State.gresite.length; } else v.classList.add('hidden'); },
            updateProfileUI() { if(State.currentUser) document.getElementById('user-email-display').innerText = State.currentUser.email; },
            startSubjectMix() { Engine.startQuiz({ mode: 'SUBJECT_MIX' }); },
            startSelectedFilter() {
                const caps = Array.from(document.querySelectorAll('.cap-cb:checked')).map(i => i.value);
                const subs = Array.from(document.querySelectorAll('.sub-cb:checked')).map(i => i.value);
                Engine.startQuiz({ mode: 'SELECTED', caps, subs });
            },
            launchExam() {
                const mats = Array.from(document.querySelectorAll('.exam-mat-cb:checked')).map(i => i.value);
                const cnt = parseInt(document.getElementById('exam-count-sel').value);
                const time = parseInt(document.getElementById('exam-time-sel').value);
                this.closeExamConfig(); Engine.startQuiz({ mode: 'EXAM', examMats: mats, examCount: cnt, examTimeSec: time*60 });
            }
        };

        async function boot() {
            if(!window.supabase) return setTimeout(boot, 100);
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            UI.applyTheme();
            const cache = localStorage.getItem('grile_db_premium');
            if (cache) { db = JSON.parse(cache); document.getElementById('scr-loading').classList.add('hidden'); Router.init(); }
            await Auth.checkSession();
            fetch(API_URL).then(r => r.json()).then(data => {
                db = Utils.processRawData(data);
                localStorage.setItem('grile_db_premium', JSON.stringify(db));
                if (!cache) { document.getElementById('scr-loading').classList.add('hidden'); Router.init(); }
            });
        }

        window.addEventListener('DOMContentLoaded', boot);
    </script>
</body>
</html>
