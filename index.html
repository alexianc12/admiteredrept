            let logica = (db['Logică'] || []).sort(() => Math.random() - 0.5).slice(0, 20); 
            
            pool = [...gramatica, ...ortografie, ...economie, ...logica];
        } else {
            const selMats = Array.from(document.querySelectorAll('.exam-mat-cb:checked')).map(cb => cb.value);
            let tempPool = [];
            selMats.forEach(m => { tempPool.push(...(db[m] || []).sort(() => Math.random() - 0.5)); });
            pool = tempPool.sort(() => Math.random() - 0.5).slice(0, countVal);
        }

        if (pool.length === 0) { alert("Nu există grile suficiente în baza de date pentru selecția făcută!"); return; }
        
        state.currentMode = 'EXAM';
        state.list = pool.sort(() => Math.random() - 0.5); 
        state.idx = 0;
        
        examState.isActive = true;
        examState.totalTimeSec = timeVal * 60;
        examState.timeLeftSec = timeVal * 60;
        examState.userAnswers = {};
        
        closeExamConfig();
        
        document.getElementById('main-nav').classList.add('hidden');
        document.getElementById('exam-header').classList.remove('hidden');
        document.getElementById('exam-header').classList.add('flex');
        
        startTimer();
        navigateTo('scr-quiz');
        renderQ();
    }

    function startTimer() {
        clearInterval(examState.timer);
        examState.timer = setInterval(() => {
            if(!examState.isActive) { clearInterval(examState.timer); return; }
            
            examState.timeLeftSec--;
            let h = Math.floor(examState.timeLeftSec / 3600);
            let m = Math.floor((examState.timeLeftSec % 3600) / 60);
            let s = examState.timeLeftSec % 60;
            
            let timeStr = h > 0 ? 
                `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}` : 
                `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                
            document.getElementById('exam-timer').innerText = timeStr;
            
            if (examState.timeLeftSec < 300) document.getElementById('exam-timer').classList.add('animate__animated', 'animate__pulse', 'animate__infinite');
            
            if(examState.timeLeftSec <= 0) { clearInterval(examState.timer); finishExam(); }
        }, 1000);
    }

    async function checkSession() 
    {
        try 
	{
            const { data: { session } } = await supabaseClient.auth.getSession();
            currentUser = session?.user || null;
            if (currentUser) 
	    {
                try { posthog.identify(currentUser.id, { email: currentUser.email }); } catch(e) {}
                const progressPromise = supabaseClient.from('user_progress').select('grila_id, status, materie').eq('user_id', currentUser.id);
                updateStreak(); 
                
                const { data } = await progressPromise;
                if (data) {
                    state.rawProgress = data;
                    state.corecte = data.filter(d => d.status === 'corect').map(d => String(d.grila_id));
                    state.gresite = data.filter(d => d.status === 'gresit').map(d => String(d.grila_id));
                }
                
                document.getElementById('auth-prompt')?.classList.add('hidden');
            }
            updateProfileUI(); updateLobbyUI();
        } catch(e) { console.error("Eroare sesiune:", e); }
    }

    async function updateStreak() {
        // Dacă nu e logat, ascundem focul
        if (!currentUser) {
            document.getElementById('streak-container').classList.add('hidden');
            return;
        }
        
        // FORȚĂM AFIȘAREA IMEDIATĂ LA LOGARE (cu valoarea 0 sau ce e în memorie)
        document.getElementById('streak-container').classList.remove('hidden');
        document.getElementById('streak-count').innerText = state.streak || 0;
        
        const today = new Date().toISOString().split('T')[0];
        
        try {
            let { data, error } = await supabaseClient
                .from('user_profiles')
                .select('last_active_date, current_streak')
                .eq('user_id', currentUser.id)
                .single();

            if (error && error.code === 'PGRST116') {
                 const { data: newData } = await supabaseClient
                    .from('user_profiles')
                    .insert([{ user_id: currentUser.id, last_active_date: today, current_streak: 1 }])
                    .select()
                    .single();
                 data = newData;
            }

            if (data) {
                let newStreak = data.current_streak;
                const lastDate = data.last_active_date;

                if (lastDate !== today) {
                    const yesterday = new Date();
                    yesterday.setDate(yesterday.getDate() - 1);
                    const yesterdayStr = yesterday.toISOString().split('T')[0];

                    if (lastDate === yesterdayStr) {
                        newStreak++;
                    } else {
                        newStreak = 1; 
                    }
                    
                    await supabaseClient.from('user_profiles').update({
                        last_active_date: today,
                        current_streak: newStreak
                    }).eq('user_id', currentUser.id);
                }
                
                // ACTUALIZĂM UI-ul CU VALOAREA REALĂ DIN BAZA DE DATE
                state.streak = newStreak;
                document.getElementById('streak-count').innerText = newStreak;
            }
        } catch (e) {
            console.log("Conexiunea la tabela de streak nu este încă activă.");
        }
    }
    async function saveProgressToCloud(grilaId, materie, statusStr) {
        if (!currentUser) return;
        const idStr = String(grilaId);
        if (statusStr === 'corect' && state.corecte.includes(idStr)) return;
        
        const { error } = await supabaseClient
            .from('user_progress')
            .upsert({ user_id: currentUser.id, grila_id: idStr, materie: materie, status: statusStr }, { onConflict: 'user_id, grila_id' });
            
        if (!error) {
            if (statusStr === 'corect') {
                if (!state.corecte.includes(idStr)) state.corecte.push(idStr);
                state.gresite = state.gresite.filter(id => id !== idStr);
            } else {
                if (!state.gresite.includes(idStr)) state.gresite.push(idStr);
            }
            const target = state.rawProgress.find(p => p.grila_id === idStr);
            if (target) target.status = statusStr; else state.rawProgress.push({ grila_id: idStr, status: statusStr, materie: materie });
            updateProfileUI(); updateLobbyUI();
        }
    }

    function startFilteredQuiz(mode) 
    {
        state.currentMode = mode;
        let pool = [];
        if (mode === 'GLOBAL_RANDOM' || mode === 'ERRORS') {
            pool = [].concat(...Object.values(db));
        } else {
            pool = db[state.currentSubject] || [];
        }
        
        if (mode === 'SELECTED') {
            const selCaps = Array.from(document.querySelectorAll('.cap-cb:checked')).map(c => c.value);
            const selSubs = Array.from(document.querySelectorAll('.sub-cb:checked')).map(c => c.value);
            pool = pool.filter(q => selCaps.includes(q.capitol?.trim()) || selSubs.includes(q.subcapitol?.trim()));
        }

        const originalPool = [...pool];
        
        pool = pool.filter(q => {
            let gid = q.id || q.id_grila || ""; const m = q.enunt.match(/^\s*(\d+)[\.\-\)]\s+/);
            if (m) gid = gid || m[1]; gid = String(gid);
            
            if (mode === 'ERRORS') return state.gresite.includes(gid);
            return !state.corecte.includes(gid) && !state.gresite.includes(gid); 
        });

        if (!pool.length && originalPool.length > 0) {
            pool = originalPool;
        }

        if (!pool.length) return;
        
        state.list = pool.sort(() => Math.random() - 0.5);
        state.idx = 0;
        
        try { 
            posthog.capture('quiz_start', { modul: mode, subiect: state.currentSubject, numar_grile: pool.length }); 
        } catch(e){}
        
        // Când începe testul, îl mutăm pe ruta de rezolvare
   	navigateTo('scr-quiz', '/rezolvare-grile'); 
   	renderQ();
    }


function renderQ() {
state.qStartTime = Date.now();
        state.step = 'select';
        document.getElementById('auth-prompt').classList.add('hidden');
        const q = state.list[state.idx];
        
        let breadcrumbs = q.computedMaterie || state.currentSubject || 'Mix Global';
        const cap = q.capitol || "";
        const subcap = q.subcapitol || "";
        
        if (cap && cap !== "General" && cap !== "General - Mix") breadcrumbs += ` &rarr; ${cap}`;
        if (subcap && subcap !== "General" && subcap !== "") breadcrumbs += ` &rarr; ${subcap}`;
        
        document.getElementById('q-meta').innerHTML = breadcrumbs;

        const btn = document.getElementById('btn-action');
        btn.disabled = true; btn.innerText = "Trimite Răspunsul"; btn.onclick = submitAnswer;
        btn.className = "w-full max-w-md py-5 bg-academia-navy text-academia-gold rounded-2xl font-black text-xl disabled:opacity-20 transition-all border-none cursor-pointer active-scale shadow-xl";
        
        if (state.currentMode === 'EXAM') {
            document.getElementById('exam-progress-text').innerText = `Grila ${state.idx + 1} din ${state.list.length}`;
            document.getElementById('exam-progress-bar').style.width = `${((state.idx) / state.list.length) * 100}%`;
            btn.innerText = state.idx === state.list.length - 1 ? "Finalizează Examenul" : "Salvează și Continuă";
        }
        
        let txt = q.enunt || ""; 
        let gid = q.id || q.id_grila || "";
        const m = txt.match(/^\s*(\d+)[\.\-\)]\s+/);
        if (m) { gid = gid || m[1]; txt = txt.replace(m[0], ''); }
        
        txt = txt.replace(/\$/g, ''); 
        txt = txt.replace(/_\{([^\}]+)\}/g, '<sub>$1</sub>');
        txt = txt.replace(/_([a-zA-Z0-9])/g, '<sub>$1</sub>');
        txt = txt.replace(/\^\{([^\}]+)\}/g, '<sup>$1</sup>');
        txt = txt.replace(/\^([a-zA-Z0-9])/g, '<sup>$1</sup>');
        txt = txt.replace(/\\cdot/g, '&middot;');

        txt = txt.replace(/(enun[tț]ul|fraza)\s*:\s*(.*?(?:\.|\!|\?))/gi, (match, prefix, continut) => {
            return `${prefix}: „${continut}”`;
        });
        txt = txt.replace(/(cuv[aă]ntului)\s+["„«]?([^\s.,:;!?\)]+)["”»]?/gi, '$1 „$2”');

        const premiumUnderline = '<u class="decoration-academia-gold decoration-[2.5px] underline-offset-[4px] font-black text-academia-navy dark:text-white">$1</u>';
        
        txt = txt.replace(/\[\[u\]\](.*?)\[\[\/u\]\]/gi, premiumUnderline);
        txt = txt.replace(/<u[^>]*>(.*?)<\/u>/gi, premiumUnderline);
        txt = txt.replace(/\[\[(.*?)\]\]/g, premiumUnderline); 
        txt = txt.replace(/\*(.*?)\*/g, premiumUnderline);      

        if (q.computedMaterie === 'Logică') {
            txt = txt.replace(/\s\d+\s/g, ' '); 
        }

        document.getElementById('q-text').innerHTML = `<div class="font-bold text-xl md:text-2xl leading-snug animate__animated animate__fadeIn text-academia-navy dark:text-white">${txt}</div>`;
        
        let sTxt = (gid || q.sursa) ? `Sursa: ${[gid, q.sursa].filter(Boolean).join(", ")}` : "";
        document.getElementById('q-sursa').innerText = sTxt;
        
        const cont = document.getElementById('q-options'); cont.innerHTML = "";
        ['var_a', 'var_b', 'var_c', 'var_d'].forEach(k => {
            let val = q[k];
            if (!val) return;
            
            if (typeof val === 'string') {
                val = val.replace(/\$/g, '');
                val = val.replace(/_\{([^\}]+)\}/g, '<sub>$1</sub>');
                val = val.replace(/_([a-zA-Z0-9])/g, '<sub>$1</sub>');
                val = val.replace(/\^\{([^\}]+)\}/g, '<sup>$1</sup>');
                val = val.replace(/\^([a-zA-Z0-9])/g, '<sup>$1</sup>');
                val = val.replace(/\\cdot/g, '&middot;');
            }
            
            const letter = k.split('_')[1].toUpperCase(); 
            const opt = document.createElement('div');
            opt.className = "opt-card p-5 glass-card dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 rounded-2xl cursor-pointer font-bold flex gap-4 items-center active-scale transition-all";
            opt.innerHTML = `<span class="w-10 h-10 rounded-xl border-2 border-slate-200 dark:border-slate-600 flex items-center justify-center text-sm font-black text-slate-400 dark:text-slate-400 flex-shrink-0 transition-colors">${letter}</span><span class="text-academia-navy dark:text-slate-200 text-lg leading-snug transition-colors">${val}</span>`;
            opt.onclick = () => {
                if(state.step !== 'select') return;
                document.querySelectorAll('.opt-card').forEach(c => c.classList.remove('border-academia-gold', 'bg-academia-goldL', 'dark:bg-slate-900'));
                opt.classList.add('border-academia-gold', 'bg-academia-goldL', 'dark:bg-slate-900');
                state.selectedVal = letter; state.selectedEl = opt; btn.disabled = false;
            };
            cont.appendChild(opt);
        });
    }

    function submitAnswer() {
        if (state.step !== 'select') return;
        const q = state.list[state.idx];
        const cor = (q.raspuns_corect || "").trim().toUpperCase();
        const corIdx = ['A','B','C','D'].indexOf(cor); const corEl = document.querySelector(`.opt-card:nth-child(${corIdx + 1})`);
        
        let gid = q.id || q.id_grila || "";
        const matchGid = (q.enunt || "").match(/^\s*(\d+)[\.\-\)]\s+/);
        if (matchGid) gid = gid || matchGid[1];
        
        document.querySelectorAll('.opt-card').forEach(c => c.classList.add('opacity-30'));
        [state.selectedEl, corEl].forEach(c => c?.classList.remove('opacity-30'));
        
        const isCorrect = state.selectedVal === cor;
        state.selectedEl.classList.remove('bg-white', 'bg-academia-goldL', 'border-slate-100', 'border-academia-gold', 'glass-card', 'dark:bg-slate-800', 'dark:border-slate-700', 'dark:bg-slate-900');
        state.selectedEl.classList.add('text-white');

        if (isCorrect) {
            state.selectedEl.classList.add('bg-emerald-500', 'border-emerald-500');
            state.selectedEl.querySelectorAll('span').forEach(s=>s.classList.add('text-white', 'border-white'));
            const duration = Math.floor((Date.now() - state.qStartTime) / 1000);
if (currentUser) saveProgressToCloud(q.id || state.idx, q.computedMaterie || state.currentSubject, isCorrect ? 'corect' : 'gresit', duration);
            
            try { posthog.capture('grila_rezolvata', { materie: q.computedMaterie, capitol: q.capitol, subcapitol: q.subcapitol, status: 'corect', id_grila: gid }); } catch(e){}
            
        } else {
            state.selectedEl.classList.add('bg-rose-500', 'border-rose-500');
            state.selectedEl.querySelectorAll('span').forEach(s=>s.classList.add('text-white', 'border-white'));
            if (corEl) {
                corEl.classList.remove('bg-white', 'border-slate-100', 'glass-card', 'dark:bg-slate-800', 'dark:border-slate-700', 'dark:bg-slate-900');
                corEl.classList.add('bg-emerald-500', 'border-emerald-500', 'text-white');
                corEl.querySelectorAll('span').forEach(s => { s.classList.remove('text-slate-400', 'dark:text-slate-400', 'border-slate-200', 'dark:border-slate-600'); s.classList.add('text-white', 'border-white'); });
            }
            if (currentUser) saveProgressToCloud(q.id || state.idx, q.computedMaterie || state.currentSubject, 'gresit');
            
            try { posthog.capture('grila_rezolvata', { materie: q.computedMaterie, capitol: q.capitol, subcapitol: q.subcapitol, status: 'gresit', id_grila: gid }); } catch(e){}
        }
        
        if (state.currentMode === 'EXAM') { examState.userAnswers[gid || state.idx] = state.selectedVal; }
        
        if (!currentUser && state.currentMode !== 'EXAM') {
            document.getElementById('auth-prompt-msg').innerText = "Atenție: Progresul tău nu se salvează.";
            document.getElementById('auth-prompt').classList.remove('hidden');
        }
        
        state.step = 'validate'; const btn = document.getElementById('btn-action');
        btn.innerText = "Continuă cu următoarea grilă \u2192"; btn.classList.add('bg-academia-gold', 'text-white');

        btn.onclick = () => { state.idx++; if (state.idx < state.list.length) { renderQ(); } else { if(state.currentMode === 'EXAM') finishExam(); else goBack(); } };
    }

function processRawData(data) {
        const formatString = (str, isEcoLog) => {
            if (isEcoLog) return "General";
            if (!str) return "General";
            let cleaned = String(str).trim();
            if (!cleaned || cleaned.toLowerCase() === "general") return "General";
            return cleaned.charAt(0).toUpperCase() + cleaned.slice(1);
        };

        return data.reduce((acc, item) => {
            const materie = item.materie || item.MATERIE || item.Materie;
            const enunt = item.enunt || item.ENUNT || item.Enunt;
            if (!materie || !enunt || String(enunt).trim() === "") return acc;
            
            let rawM = String(materie).trim();
            let m = rawM;
            const lowerM = rawM.toLowerCase();
            let isEcoLog = false;
            
            if (lowerM.includes('română')) m = 'Limba română';
            else if (lowerM.includes('economie')) { m = 'Economie'; isEcoLog = true; }
            else if (lowerM.includes('gândire') || lowerM.includes('logic')) { m = 'Logică'; isEcoLog = true; }

            let cap = String(item.capitol || item.CAPITOL || item.Capitol || "").trim();
            let sub = String(item.subcapitol || item.SUBCAPITOL || item.Subcapitol || item.sub || "").trim();

            let capL = cap.toLowerCase();
            let subL = sub.toLowerCase();

            // UNIFICARE CAPITOL
            if (capL.includes("gramatică") || capL.includes("gramatica")) cap = "Gramatică";
            if (capL.includes("ortografie") || capL.includes("ortoepie") || capL.includes("lexico-semantice")) {
                cap = "Ortografie, ortoepie și punctuație";
            }
            
            // UNIFICARE SUBCAPITOL (Păstrăm detaliile, dar unificăm variantele de sintaxă)
            if (subL.includes("sintaxa frazei") || subL.includes("enunțul") || subL.includes("propoziția") || subL.includes("fraza") || subL.includes("enuntul") || subL.includes("propozitia")) {
                sub = "Enunțul, propoziția și fraza";
            }
            
            // Dacă subcapitolul devine identic cu capitolul după curățare, îl facem "General" ca să nu apară dublat
            if (sub.toLowerCase().trim() === cap.toLowerCase().trim()) {
                sub = "General";
            }

            item.capitol = formatString(cap, false);
            item.subcapitol = formatString(sub, isEcoLog);
            item.computedMaterie = m;

            item.var_a = item.var_a || item.VAR_A || item.a;
            item.var_b = item.var_b || item.VAR_B || item.b;
            item.var_c = item.var_c || item.VAR_C || item.c;
            item.var_d = item.var_d || item.VAR_D || item.d;
            item.raspuns_corect = item.raspuns_corect || item.RASPUNS_CORECT || item.raspuns;

            if (!acc[m]) acc[m] = [];
            acc[m].push(item);
            return acc;
        }, {});
    }


    async function init() 
{
        try {
            if(!window.supabase) {
                setTimeout(init, 100); 
                return;
            }
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            const cachedData = localStorage.getItem('grile_db_premium');
            if (cachedData) {
                db = JSON.parse(cachedData);
                handleInitialRoute();
                document.getElementById('scr-loading').classList.add('hidden'); 
            } else {
                document.getElementById('scr-loading').classList.remove('hidden');
            }
            
            checkSession().catch(e => console.log("Auth silent fail"));
            
            fetch(API_URL)
                .then(res => {
                    if(!res.ok) throw new Error("Eroare rețea");
                    return res.json();
                })
                .then(data => {
                    const freshDb = processRawData(data);
                    localStorage.setItem('grile_db_premium', JSON.stringify(freshDb));
                    
                    if (!cachedData) {
                        db = freshDb;
                        handleInitialRoute();
                        document.getElementById('scr-loading').classList.add('hidden');
                    }
                })
                .catch(err => console.log("Avertisment fetch fundal:", err));
            
        } catch(e) {
            document.getElementById('error-details').innerText = e.message;
            document.getElementById('scr-loading').classList.add('hidden');
            navigateTo('scr-error');
        }
    }

    function renderLobby() {
        const list = document.getElementById('subject-list'); list.innerHTML = "";
        Object.keys(db).forEach(m => {
            const d = document.createElement('div');
            d.className = "p-6 glass-card dark:bg-slate-900 border-2 border-slate-100 dark:border-slate-800 rounded-3xl cursor-pointer hover:border-academia-gold transition-all active-scale font-black text-xl flex justify-between items-center group shadow-sm";
            d.onclick = () => {
                try { posthog.capture('materie_selectata', { materie: m }); } catch(err){}
                openFilter(m);
            };
            d.innerHTML = `<span class="dark:text-white">${m}</span> <span class="text-academia-gold group-hover:translate-x-2 transition-transform">&rarr;</span>`;
            list.appendChild(d);
        });
        
    navigateTo('scr-lobby', '/'); 
    updateLobbyUI();
    }

           function openFilter(m) {
        state.currentSubject = m; 
        document.getElementById('filter-title').innerText = m;
        const capsData = {};
        
        db[m].forEach(q => {
            const c = q.capitol || "General - Mix";
            const sc = q.subcapitol || "General";
            // Folosim Set() pentru deduplicare automată nativă
            if (!capsData[c]) capsData[c] = { subcaps: new Set() };
            if (sc !== "General") capsData[c].subcaps.add(sc);
        });
        
        let sortedCaps = Object.keys(capsData).sort((a, b) => a.localeCompare(b, 'ro'));
        const cont = document.getElementById('filter-list'); 
        cont.innerHTML = "";

        sortedCaps.forEach(cap => {
            const capId = 'cap_' + cap.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, '');
            const subArr = Array.from(capsData[cap].subcaps).sort((a, b) => a.localeCompare(b, 'ro'));

            let html = `
                <div class="mb-4">
                    <div class="glass-card dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-[24px] p-5 flex items-center justify-between cursor-pointer hover:border-academia-gold transition-all active-scale shadow-sm" onclick="toggleAccordion('${capId}')">
                        <label class="flex items-center gap-4 cursor-pointer" onclick="event.stopPropagation()">
                            <input type="checkbox" class="cap-cb w-6 h-6 accent-academia-gold cursor-pointer" value="${cap}" onchange="toggleSubcaps('${capId}', this.checked)" checked>
                            <span class="font-black text-xl text-academia-navy dark:text-white uppercase tracking-tight">${cap}</span>
                        </label>
                        <span id="${capId}_arrow" class="arrow-rotate text-academia-gold font-bold text-xl px-2">&#9662;</span>
                    </div>
                    
                    <div id="${capId}_wrap" class="accordion-content accordion-open">
                        <div class="pt-4 pl-6 flex flex-col gap-3">
                            ${subArr.map(sub => `
                                <label class="flex items-center gap-3 p-4 bg-white dark:bg-slate-800 border border-transparent hover:border-academia-gold rounded-2xl cursor-pointer transition-all shadow-sm active-scale">
                                    <input type="checkbox" class="sub-cb w-5 h-5 accent-academia-gold cursor-pointer" value="${sub}" checked>
                                    <span class="font-bold text-slate-700 dark:text-slate-200">${sub}</span>
                                </label>
                            `).join('')}
                        </div>
                    </div>
                </div>`;
            cont.innerHTML += html;
        });

        // Mentinerea logicii de Routing SPA
        const slug = '/' + m.toLowerCase().replace(/ /g, '-').normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        navigateTo('scr-filter', slug);
    }
    



    function finishExam() {
        examState.isActive = false;
        clearInterval(examState.timer);
        
        document.getElementById('main-nav').classList.remove('hidden');
        document.getElementById('exam-header').classList.add('hidden');
        document.getElementById('exam-header').classList.remove('flex');
        
        let scor = 0;
        state.list.forEach((q, index) => {
            let gid = q.id || q.id_grila || ""; 
            const m = q.enunt.match(/^\s*(\d+)[\.\-\)]\s+/); 
            if (m) gid = gid || m[1];
            gid = gid || index;

            let raspunsElev = examState.userAnswers[gid] || "N/A";
            let raspunsCorect = (q.raspuns_corect || "").trim().toUpperCase();
            let status = (raspunsElev === raspunsCorect) ? 'corect' : 'gresit';
            
            if (status === 'corect') scor++;
        });
        
        let procent = Math.round((scor / state.list.length) * 100);
        
        try {
            posthog.capture('examen_finalizat', { 
                scor: scor, 
                total_grile: state.list.length, 
                acuratete: procent,
                timp_ramas_secunde: examState.timeLeftSec
            });
        } catch(e) {}
        
        const quizCard = document.querySelector('#scr-quiz > div');
        quizCard.innerHTML = `
            <div class="text-center py-12 animate__animated animate__fadeIn">
                <h2 class="text-4xl md:text-5xl font-black text-academia-navy dark:text-white mb-4">Examen Finalizat</h2>
                <p class="text-slate-500 dark:text-slate-400 mb-10 font-bold uppercase tracking-widest text-xs">Raport de performanță</p>
                
                <div class="inline-flex items-center justify-center w-40 h-40 rounded-full border-[8px] ${procent >= 70 ? 'border-emerald-500 text-emerald-500' : 'border-academia-gold text-academia-gold'} mb-8 shadow-xl">
                    <span class="text-5xl font-black">${scor}/${state.list.length}</span>
                </div>
                
                <h3 class="text-3xl font-black text-academia-navy dark:text-white mb-10">${procent}% Acuratețe</h3>
                
                <button onclick="window.location.reload()" class="w-full max-w-md py-6 bg-academia-navy text-academia-gold rounded-[24px] font-black text-xl border-none cursor-pointer active-scale shadow-2xl hover:shadow-lg transition-all">Revenire la Dashboard</button>
            </div>
        `;
        
        if(procent >= 70) confetti({ particleCount: 200, spread: 90, origin: { y: 0.6 } });
    }

    window.addEventListener('DOMContentLoaded', init);
    // Gestionarea nativă a butoanelor Back/Forward din browser
    window.addEventListener('popstate', (e) =>
    { 
        if (e.state && e.state.screenId) {
            // Reîncărcăm ecranul precedent salvat în starea istoriei (fără a forța un nou URL)
            navigateTo(e.state.screenId); 
        } else {
            navigateTo('scr-lobby', '/');
        }
    });

    // Rutare inițială: Dacă utilizatorul intră direct pe domeniul-tau.ro/limba-romana
    function handleInitialRoute() 
    {
        const path = window.location.pathname;
        if (path.includes('romana') && db['Limba română']) openFilter('Limba română');
        else if (path.includes('economie') && db['Economie']) openFilter('Economie');
        else if (path.includes('logica') && db['Logică']) openFilter('Logică');
        else if (path.includes('rezolvare')) navigateTo('scr-lobby', '/'); // Resetăm la lobby pentru a nu bloca fluxul
        else { navigateTo('scr-lobby', '/'); updateLobbyUI(); }
    }
    function goBack() { navigateTo('scr-lobby'); }
</script>
